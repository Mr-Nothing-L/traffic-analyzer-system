# =============================================================================
# Logic Chains Configuration
# =============================================================================
# 多步推理链，用于处理需要多步判断的复杂事件。
#
# 步骤类型 (step_type)：
#   vlm_call  → VLM 调用（需 prompt_template_id + input_images）
#   compute   → 本地计算（需 compute_expression）
#   condition → 条件分支（需 condition_expression + true_next_step/false_next_step）
#   aggregate → 结果汇总（需 context_vars_mapping）
#
# 变量通过 ${key} 引用，结果存入 local_vars 供后续步骤使用。
# 最终步骤的 output_key 必须是 "event_result"。
# =============================================================================

logic_chains:
  # --- event_id: 2 | 交通事故 (scene_tag 模式，零 VLM 调用) ---
  - chain_id: "accident_scene_tag"
    name: "交通事故检测（场景标签）"
    target_event_id: 2
    precondition: "scene_understanding is not None"
    steps:
      - step_id: "A1"
        step_type: "compute"
        name: "解析交通事故标签"
        compute_expression: |
          import re
          desc = scene_understanding.scene_description if scene_understanding else ""
          pattern = re.compile(r"[\{【\[]\s*([^\{\}【】\[\]：:=→]+?)\s*[：:=→]\s*(.*?)[\}】\]]", re.DOTALL)
          _PUNCT = "。，；！？.,;!?"
          tags = {}
          for m in pattern.finditer(desc):
              key = m.group(1).strip()
              value = m.group(2).strip(_PUNCT).strip()
              if key:
                  tags[key] = value
          accident_tag = tags.get("交通事故", "")
          if accident_tag.startswith("有"):
              return {
                  "detected": True,
                  "instances": [{
                      "start_time_sec": 0.0, "end_time_sec": 0.0, "confidence": 0.65,
                      "description": "交通事故（场景标签推断：" + accident_tag + "）",
                      "reasoning": "场景描述 {交通事故：...} 标签显示存在交通事故。",
                  }],
                  "confidence": 0.65,
                  "summary": "交通事故（场景标签推断：" + accident_tag + "）",
                  "reasoning": "场景描述 {交通事故：...} 标签显示存在交通事故。",
              }
          else:
              return {
                  "detected": False, "instances": [], "confidence": 0.0,
                  "summary": "未检测到交通事故",
                  "reasoning": "场景描述 {交通事故：...} 标签显示不存在。",
              }
        output_key: "event_result"

  # --- event_id: 7 | 车辆逆行/倒车 ---
  - chain_id: "vehicle_reversing"
    name: "车辆逆行/倒车检测"
    target_event_id: 7
    precondition: |
      event_results.get(0, {}).get('detected', False) or
      event_results.get(1, {}).get('detected', False) or
      scene_tags.get('静止车辆', '').startswith('有') or
      scene_tags.get('应急车道车辆', '').startswith('有')
    steps:
      - step_id: "S1"
        step_type: "vlm_call"
        name: "直接逆行检测"
        prompt_template_id: "direct_reversing_detection"
        input_images: ["${keyframes.coarse_frames}"]
        context_vars_mapping:
          road_count: "${scene_understanding.road_count}"
          road_directions: "${scene_understanding.roads}"
          scene_description: "${scene_understanding.scene_description}"
        output_key: "reversing_result"
        response_schema:
          type: "object"
          required: ["vehicles", "detected", "confidence", "reasoning"]

      - step_id: "S2"
        step_type: "aggregate"
        name: "构建结果"
        context_vars_mapping:
          detected: "${reversing_result.detected}"
          instances: "${reversing_result.vehicles}"
          confidence: "${reversing_result.confidence}"
          reasoning: "${reversing_result.reasoning}"
        output_key: "event_result"

  # --- event_id: 1 | 应急车道占用 ---
  # ⚠️ 此 chain 引用的 prompt_template_id "emergency_lane_location" 和
  #    "emergency_lane_vehicle_tracking" 当前不存在于 prompt_templates.yaml。
  #    如需启用，请先补全对应模板。
  - chain_id: "emergency_lane_occupancy"
    name: "应急车道占用检测"
    target_event_id: 1
    steps:
      - step_id: "EL1"
        step_type: "vlm_call"
        name: "定位应急车道"
        prompt_template_id: "emergency_lane_location"
        input_images: ["${keyframes.coarse_frames}"]
        output_key: "emergency_lane_regions"

      - step_id: "EL2"
        step_type: "vlm_call"
        name: "追踪应急车道车辆"
        prompt_template_id: "emergency_lane_vehicle_tracking"
        input_images: ["${keyframes.coarse_frames}"]
        context_vars_mapping:
          emergency_lane_regions: "${emergency_lane_regions}"
        output_key: "emergency_vehicles"

      - step_id: "EL3"
        step_type: "compute"
        name: "构建结果"
        compute_expression: |
          vehicles = emergency_vehicles.get("vehicles", [])
          if len(vehicles) > 0:
              return {
                  "detected": True, "instances": vehicles,
                  "confidence": emergency_vehicles.get("confidence", 0.85),
                  "summary": "检测到应急车道占用",
              }
          else:
              return {"detected": False, "instances": [], "confidence": 0.0, "summary": "未检测到应急车道占用"}
        output_key: "event_result"

  # --- event_id: 9 | 实线变道 [关闭中] ---
  - chain_id: "lane_change_solid"
    name: "实线变道检测"
    target_event_id: 9
    steps:
      - step_id: "LC1"
        step_type: "vlm_call"
        name: "识别车道标线"
        prompt_template_id: "lane_marking_identification"
        input_images: ["${keyframes.coarse_frames}"]
        output_key: "lane_markings"
        response_schema:
          type: "object"
          required: ["lane_markings"]

      - step_id: "LC2"
        step_type: "vlm_call"
        name: "追踪变道"
        prompt_template_id: "lane_change_tracking"
        input_images: ["${keyframes.precision_frames}"]
        context_vars_mapping:
          lane_markings: "${lane_markings}"
        output_key: "lane_changes"
        response_schema:
          type: "object"
          required: ["lane_changes"]

      - step_id: "LC3"
        step_type: "compute"
        name: "筛选实线违规"
        compute_expression: |
          def filter_solid():
              changes = lane_changes.get("lane_changes", [])
              markings = lane_markings.get("lane_markings", [])
              solid_violations = []
              for change in changes:
                  crossed = next((m for m in markings if m.get("type") == "solid"), None)
                  if crossed:
                      solid_violations.append(change)
              return solid_violations
        output_key: "violations"

      - step_id: "LC4"
        step_type: "aggregate"
        name: "构建结果"
        output_key: "event_result"
        context_vars_mapping:
          detected: "${len(violations) > 0}"
          instances: "${violations}"
          confidence: "${0.8 if len(violations) > 0 else 0.0}"

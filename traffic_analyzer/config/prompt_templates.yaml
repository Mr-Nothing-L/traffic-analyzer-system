# =============================================================================
# Prompt Templates Configuration
# =============================================================================
# Reusable prompt templates for VLM calls.
# Each template uses Jinja2 syntax for variable substitution.
# =============================================================================

prompt_templates:
  # ---------------------------------------------------------------------------
  # Scene Understanding
  # ---------------------------------------------------------------------------
  - template_id: "scene_understanding"
    name: "Global Scene Understanding"
    system_prompt: |
      You are an expert traffic surveillance analyst. Analyze the provided video frames from a highway monitoring camera.
      Provide a structured analysis of the scene. Be precise and factual.
    user_prompt: |
      Analyze these video frames from a highway surveillance camera.

      Please provide your analysis in the following JSON format:
      {
        "road_count": <number of distinct roads/lane groups>,
        "roads": [
          {
            "road_id": <0-based index>,
            "name": "<camera-relative description. Describe which side of the frame the road is on and the observed vehicle movement direction. ALWAYS use camera/viewer-relative terms. Format: 'XX侧道路，车辆从画面底部向顶部行驶（从近到远）' or 'XX侧道路，车辆从画面顶部向底部行驶（从远到近）'. The direction MUST be described relative to the camera/viewer, NOT relative to the road itself.>",
            "normal_direction": "<toward_top|toward_bottom|toward_left|toward_right>",
            "direction_confidence": <0.0-1.0>,
            "direction_evidence": [
              {
                "vehicle": "<brief description, e.g. 白色轿车>",
                "movement": "<toward_top|toward_bottom|toward_left|toward_right|stationary>",
                "location_earlier": "<where vehicle was in earlier frame, e.g. frame-bottom, frame-top-left, center>",
                "location_later": "<where vehicle was in later frame, e.g. frame-top, frame-bottom-right, center>",
                "frames_compared": "<e.g. Frame 1 → Frame 2>"
              }
            ],
            "lane_count": <number of lanes>,
            "has_emergency_lane": <true|false>
          }
        ],
        "weather": "<clear|rain|fog|snow|unknown>",
        "lighting": "<day|night|dusk|dawn|unknown>",
        "traffic_density": "<light|moderate|heavy>",
        "total_vehicles_estimate": <approximate count>,
        "scene_description": "<brief overall description>",
        "pedestrian_present": <true|false>,
        "non_motor_vehicle_present": <true|false>,
        "thrown_object_present": <true|false>,
        "confidence": <0.0-1.0>,
        "direction_analysis": {
          "anchor_points": [
            {"name": "...", "position": "...", "type": "..."}
          ],
          "vehicle_motions": [
            {
              "vehicle_id": "...",
              "description": "...",
              "displacement": "...",
              "movement_direction": "toward_top|toward_bottom|toward_left|toward_right|stationary",
              "road_id": 0
            }
          ],
          "head_orientations": [
            {
              "vehicle_id": "...",
              "head_orientation": "toward_top|toward_bottom|toward_left|toward_right|unknown",
              "evidence": "..."
            }
          ],
          "consistency_check": [
            {
              "vehicle_id": "...",
              "movement": "toward_top|...",
              "head_orientation": "toward_top|...",
              "consistent": true,
              "anomaly": false
            }
          ],
          "perspective_check": [
            {
              "vehicle_id": "...",
              "size_change": "getting larger|getting smaller|no change",
              "matches_direction": true,
              "trajectory_parallel_to_lanes": true
            }
          ],
          "conclusions": [
            {
              "road_id": 0,
              "name": "左侧道路",
              "normal_direction": "toward_top|toward_bottom|toward_left|toward_right|unknown",
              "confidence": 0.95,
              "evidence_summary": "N/M vehicles moving..."
            }
          ]
        }
      }

      CRITICAL DIRECTION RULES — follow strictly:
      1. Determine direction ONLY by observing ACTUAL vehicle movement across frames. Do NOT use road names, highway numbers, or geography.
      2. Use camera-relative semantics in the "name" field: describe as "从画面X向Y行驶" and add "(从远到近)" or "(从近到远)".
         - "从远到近" means vehicles move from the background (smaller/less detailed) toward the foreground (larger/more detailed), i.e. toward the camera.
         - "从近到远" means vehicles move away from the camera toward the background.
      3. DIRECTION DETERMINATION PROCEDURE (mandatory):
         a. EACH image has a label burned into the top-left corner showing its frame number and timestamp (e.g. "FRAME 1/4 t=0.00s [OLDEST]"). The images are provided in CHRONOLOGICAL ORDER from OLDEST to NEWEST.
         b. For EACH road, identify at least 5 vehicles on the MAIN travel lanes (ignore emergency lane / shoulder vehicles).
         c. For EACH vehicle, compare its position in an EARLIER frame (lower frame number, smaller timestamp) against a LATER frame (higher frame number, larger timestamp). Use ONLY ADJACENT frames (e.g. Frame 1 vs Frame 2, or Frame 2 vs Frame 3) — do NOT compare Frame 1 with Frame 4 because the same vehicle may have left the scene. Record the MOVEMENT direction using NATURAL-LANGUAGE directions:
            - "toward_top"    = vehicle moves closer to the TOP edge of the frame (its y-coordinate DECREASES from earlier to later frame)
            - "toward_bottom" = vehicle moves closer to the BOTTOM edge of the frame (its y-coordinate INCREASES from earlier to later frame)
            - "toward_left"   = vehicle moves closer to the LEFT edge of the frame (its x-coordinate DECREASES from earlier to later frame)
            - "toward_right"  = vehicle moves closer to the RIGHT edge of the frame (its x-coordinate INCREASES from earlier to later frame)
            - "stationary"    = vehicle did not move between frames
         d. CRITICAL — COORDINATE SYSTEM (this is the #1 source of errors):
            - In COMPUTER VISION and VIDEO FRAMES, the Y-axis points DOWNWARD.
            - Top of the frame = Y = 0.  Bottom of the frame = Y = maximum (e.g. 1080).
            - If a vehicle's Y-coordinate INCREASES from earlier frame to later frame, it moved DOWNWARD = "toward_bottom".
            - If a vehicle's Y-coordinate DECREASES from earlier frame to later frame, it moved UPWARD = "toward_top".
            - DO NOT use standard math coordinates.  DO NOT flip the Y-axis.
         e. ONLY vehicles with non-stationary movement count toward the majority vote. Stationary vehicles are excluded.
         f. The normal direction is where MOST vehicles are MOVING. This is a pure position-change vote — no head orientation involved.
         g. You MUST fill the "direction_evidence" array with at least 3 vehicles per road. For EACH vehicle you MUST write the "location_earlier" and "location_later" fields describing where the vehicle was in the earlier and later frame using CAMERA-RELATIVE POSITION DESCRIPTIONS (e.g. "画面上部中央", "画面左下角", "画面右侧偏上"). Do NOT fabricate evidence.
      4. If a median barrier / divider (green anti-glare panels, concrete barriers, double solid lines, etc.) separates two road groups, the two sides MUST have opposite directions. This is a HARD CONSTRAINT — if your initial judgment gives the same direction to both sides, you MUST re-evaluate until they are opposite.
      5. After filling direction_evidence, compute the majority direction. Set "direction_confidence" based on how many moving vehicles support the majority (e.g., 5/5 = 1.0, 4/5 = 0.8, 3/5 = 0.6).
      6. "toward_top" = toward top edge, "toward_bottom" = toward bottom edge, "toward_left" = toward left edge, "toward_right" = toward right edge.

      =============================================================================
      DIRECTION ANALYSIS PROCEDURE (6-step, mandatory — output in direction_analysis field)
      =============================================================================
      In addition to the basic direction_evidence above, you MUST perform a comprehensive 6-step direction analysis and include it in the `direction_analysis` field of your JSON output. Do NOT skip any step.

      【Step 1: 静态锚点】
      List all static reference objects (road markings, barriers, signs, stationary vehicles). Establish the directional coordinate system. Record each anchor point with: name, type, position description.

      【Step 2: 运动向量】
      For each moving vehicle on each road, extract displacement vectors between adjacent frames. Record: vehicle description, position in earlier frame, position in later frame, movement direction. Group by road/lane and summarize trends.

      【Step 3: 车头朝向】
      For each vehicle, determine head orientation (front-facing direction). Identify front features (headlights, grille) vs rear features (taillights, license plate). Record: vehicle_id, head_orientation, evidence.

      【Step 4: 一致性校验】
      Create comparison table: vehicle_id | movement_direction | head_orientation | consistent? | anomaly?
      Flag vehicles where movement opposes head orientation (reversing) or opposes normal flow (wrong-way).

      【Step 5: 透视校验】
      a) Size change: Does vehicle size change match movement direction (toward_bottom = larger, toward_top = smaller)?
      b) Trajectory: Is the vehicle trajectory parallel to lane markings?

      【Step 6: 结论】
      For each road: normal_direction, confidence (based on ratio of supporting vehicles), evidence_summary. Use ONLY actual vehicle position changes as direction evidence. If a median barrier separates roads, the two sides MUST have opposite directions.

      IMPORTANT — scene_description requirements:
      In the "scene_description" field, you MUST use the following EXACT structured format for each indicator. This format allows automated parsing — do NOT deviate from it.

      Use the pattern `{类别：状态/描述}` where "无" means absent and any other text means present with details.

      Required tags (must ALL appear in the scene_description, in this order):
      1. `{车流方向：描述}` — For each road, state the normal flow direction explicitly using camera-relative terms (e.g. "左侧道路从画面底部向顶部行驶（从近到远），右侧道路从画面顶部向底部行驶（从远到近）"). Always include both the frame-relative direction (从画面X向Y) AND the depth cue (从近到远/从远到近).
      2. `{行人：无}` or `{行人：有，具体描述}` — "无" if no pedestrians; otherwise describe what you see.
      3. `{应急车道车辆：无}` or `{应急车道车辆：有，具体描述}` — "无" if no vehicles on shoulder; otherwise describe.
      4. `{停车：无}` or `{停车：有，具体描述}` — "无" if no stationary vehicles; otherwise describe.
      5. `{工程车：无}` or `{工程车：有，具体描述}` — "无" if no construction; otherwise describe equipment/vehicles/workers present.
      6. `{非机动车：无}` or `{非机动车：有，具体描述}` — "无" if no motorcycles/bicycles; otherwise describe.
      7. `{交通事故：无}` or `{交通事故：有，具体描述}` — "无" if no accidents; otherwise describe collisions, overturned vehicles, fire, smoke, debris. BE CONSERVATIVE — only use "有" if you are confident.

      CRITICAL RULES:
      - The tag name inside the braces must be EXACTLY as shown above.
      - If an event is NOT present, you MUST write "无" after the colon. Do NOT write "未发现" or leave it blank.
      - If an event IS present, write "有，" followed by a brief factual description.
      - All text must be written in Chinese (中文).
      - Example valid scene_description:
        "{车流方向：左侧道路从画面底部向顶部行驶（从近到远），右侧道路从画面顶部向底部行驶（从远到近）} {行人：无} {应急车道车辆：无} {停车：无} {工程车：无} {非机动车：无} {交通事故：无}"
    output_format_hint: "JSON"

  # ---------------------------------------------------------------------------
  # Direction Analysis (multi-step comprehensive direction determination)
  # Purpose: Dedicated 6-step analysis to reliably determine traffic flow
  #          direction per road. Uses professional traffic analysis methodology.
  #          STRICT REQUIREMENT: ALL 6 steps must be executed, no skipping.
  # ---------------------------------------------------------------------------
  - template_id: "road_direction_analysis"
    name: "Road Direction Analysis"
    system_prompt: |
      You are analyzing highway traffic flow direction. Look at the movement of multiple vehicles to determine the normal driving direction for each road/lane group.
    user_prompt: |
      Analyze these video frames to determine the NORMAL driving direction for each road/lane group.

      Roads identified: {{ road_count }}

      CRITICAL:
      - EACH image has a label burned into the top-left corner showing its frame number and timestamp (e.g. "FRAME 1/8 t=0.00s [OLDEST]"). The images are provided in CHRONOLOGICAL ORDER from OLDEST to NEWEST.
      - For each road, observe the movement pattern of MULTIPLE vehicles across frames. Compare a vehicle's position in an EARLIER frame (lower frame number, smaller timestamp) against a LATER frame (higher frame number, larger timestamp).
      - The normal direction is where MOST vehicles are MOVING.
      - Do NOT use vehicle head orientation; use ONLY position change across frames.

      Return JSON:
      {
        "roads": [
          {
            "road_id": <int>,
            "normal_direction": "<toward_top|toward_bottom|toward_left|toward_right>",
            "confidence": <0.0-1.0>,
            "reasoning": "<brief explanation based on observed vehicle movements>"
          }
        ]
      }

      IMPORTANT:
      - Direction is defined relative to the video frame:
        - "toward_top"    = vehicles move closer to the TOP edge (y-coordinate DECREASES from earlier to later frame)
        - "toward_bottom" = vehicles move closer to the BOTTOM edge (y-coordinate INCREASES from earlier to later frame)
        - "toward_left"   = vehicles move closer to the LEFT edge (x-coordinate DECREASES from earlier to later frame)
        - "toward_right"  = vehicles move closer to the RIGHT edge (x-coordinate INCREASES from earlier to later frame)
      - In video frames, the y-axis visually goes DOWN (top of frame is y=0, bottom is y=max).
      - Look at MULTIPLE vehicles, not just one
      - In a two-way highway, opposite roads should have opposite directions
      - If direction is unclear, say so with lower confidence

  # ---------------------------------------------------------------------------
  # Direct Reversing Detection
  # Purpose: One-shot detection of reversing/wrong-way vehicles.
  # Why: Fewer VLM calls = fewer parse errors. Direct comparison of first/last frame
  #      catches slow reversing that "suspicious behavior" prompts miss.
  # ---------------------------------------------------------------------------
  - template_id: "direct_reversing_detection"
    name: "Direct Reversing Detection"
    system_prompt: |
      You are a traffic surveillance analyst. Your task is to detect vehicles that are reversing or driving against the normal traffic flow.
      CRITICAL: Compare the FIRST frame and the LAST frame carefully. Some vehicles may appear stationary but have actually moved slightly against the flow.
    user_prompt: |
      Examine these video frames from a highway surveillance camera.

      Scene information:
      - Road count: {{ road_count }}
      - Known normal flow directions (pre-determined from scene understanding — use these directly, do NOT re-verify):
      {% for road in road_directions %}
        Road {{ road.road_id }}: {{ road.normal_direction }}
      {% endfor %}
      - Prior knowledge from overall traffic situation analysis:
      {% if scene_description %}
        {{ scene_description }}
      {% else %}
        (No prior scene description available.)
      {% endif %}

      CRITICAL PRIOR KNOWLEDGE:
      The "Prior knowledge" above is from an earlier comprehensive scene analysis. You MUST use it as your primary guide:
      1. Focus ONLY on vehicles explicitly mentioned in the prior knowledge as being in illegal parking situations or occupying emergency lanes.
      2. Do NOT scan the entire video for every possible vehicle. Your task is narrowly scoped: check ONLY whether the already-identified suspicious vehicles (from prior knowledge) are actually reversing or driving the wrong way.
      3. If the prior knowledge does not mention any vehicle in an emergency lane or stopped illegally, conclude that no reversing/wrong-way is present.
      4. IMPORTANT — Engineering/Maintenance vehicles are NOT exempt from reversing/wrong-way checks:
         - A road maintenance truck, emergency rescue vehicle, or construction vehicle on the emergency lane CAN still be reversing or backing up.
         - Being an "engineering vehicle" or "正在作业" does NOT automatically mean its movement direction is normal.
         - You MUST still check: is the vehicle's BODY movement direction consistent with the known normal flow of its road? If it moves opposite to the known normal flow, it IS reversing/wrong-way regardless of its type or purpose.
         - Example: If a maintenance truck on the emergency lane is moving opposite to the normal traffic flow while its headlights face the normal direction, it is REVERSING (倒车). If its headlights also face the opposite direction, it is WRONG-WAY driving (逆行).

      INSTRUCTIONS:
      1. Read the "Prior knowledge" carefully. Identify which specific vehicles (if any) are mentioned as being on emergency lanes, shoulders, or stopped/parked illegally.
      2. For EACH vehicle identified in step 1, perform ALL of the following checks and write them in your reasoning:
         a. **Select two frames to compare**: Pick the EARLIEST frame and the LATEST frame where the vehicle is visible. Write their frame numbers/timestamps.
         b. **Position change using fixed reference points**: Describe the vehicle's position in each frame relative to FIXED objects (road markings, guardrails, median barriers, traffic cones, signs) using camera-relative position descriptions (e.g. "画面左侧偏上", "画面中央偏右"). Do NOT use memory or visual estimation — cite specific reference points.
         c. **Head orientation**: State which direction the vehicle's HEAD (front) is pointing (toward_top/toward_bottom/toward_left/toward_right).
         d. **Body movement direction**: State which direction the vehicle's BODY actually moved (toward_top/toward_bottom/toward_left/toward_right) based on position change in (b).
         e. **Compare with KNOWN normal flow**: The known normal flow direction for this road is listed in "Known normal flow directions" above. Is the body movement direction in (d) OPPOSITE to this known normal flow? If yes, this is WRONG-WAY or REVERSING.
         f. **Head vs body consistency**: If head orientation (c) is opposite to body movement (d), the vehicle is REVERSING / BACKING UP. If head orientation matches body movement but both are opposite to known normal flow, it is WRONG-WAY driving.
      3. Be especially careful with white/light-colored vehicles on the shoulder — they are the most common reversing candidates.
      4. If no vehicle is mentioned in the prior knowledge as suspicious, or if all mentioned vehicles are confirmed to be moving normally, report detected=false.

      Return ONLY a JSON object in this exact format (no markdown, no extra text):
      {
        "vehicles": [
          {
            "vehicle_id": "vehicle_1",
            "road_id": 0,
            "behavior": "reversing",
            "start_time_sec": 0.0,
            "end_time_sec": 22.0,
            "confidence": 0.9,
            "description": "White sedan on emergency lane moving backward",
            "reasoning": "通过对比第1帧(0.0s)和第8帧(7.0s)，黄色抢险车相对于左侧护栏和交通锥的位置明显向画面下方移动。第一帧中该车位于画面上方偏右位置，车头朝向下（画面近处）；到最后一帧中该车已移动到画面下方更近处。车辆车头朝向（朝下）与车身移动方向（朝下）一致，但都与正常车流方向（朝上）相反，属于逆行行为。"
          }
        ],
        "detected": true,
        "confidence": 0.9,
        "reasoning": "检测到1辆逆行车辆：右侧应急车道上的黄色抢险车。对比第1帧和第8帧，该车相对于交通锥和护栏的位置向画面下方移动，车头朝下但车身也向下移动，与正常车流方向（朝上）相反。"
      }

      If no reversing or wrong-way vehicles are found, return:
      {
        "vehicles": [],
        "detected": false,
        "confidence": 0.0,
        "reasoning": "详细说明检查了哪些车辆，对比了哪些帧，以及为什么判断没有倒车/逆行。例如：检查了右侧应急车道的工程车，对比第1帧和第8帧，该车相对于交通锥的位置向画面下方移动，与正常车流方向一致，因此不是倒车。"
      }

      IMPORTANT:
      - All text fields "description" and "reasoning" must be written in Chinese (中文).
      - The "reasoning" field must contain SPECIFIC frame numbers/timestamps, reference points, and the full chain of reasoning (position change → head orientation → body movement → comparison with normal flow).
      - Even when detected=false, you MUST write a detailed reasoning explaining your analysis process.

      Be conservative. Only report if you are confident after comparing frames.

  # ---------------------------------------------------------------------------
  # Vehicle Movement Tracking (precision frames)
  # ---------------------------------------------------------------------------
  - template_id: "direct_event_detection"
    name: "Direct Event Detection"
    system_prompt: |
      You are an expert traffic surveillance analyst. Examine the provided video frames and detect specific traffic events.
    user_prompt: |
      Event to detect: {{ event_name }}
      Definition: {{ event_definition }}
      Visual indicators to look for:
      {% for indicator in visual_indicators %}
      - {{ indicator }}
      {% endfor %}

      Examine these video frames carefully and determine if this event is present.

      Return JSON:
      {
        "detected": <true|false>,
        "instances": [
          {
            "start_time_sec": <approximate start time>,
            "end_time_sec": <approximate end time>,
            "confidence": <0.0-1.0>,
            "evidence_frames": [<frame indices>],
            "description": "<what you observed>",
            "reasoning": "<why you think this is the event>"
          }
        ],
        "summary": "<overall assessment>",
        "confidence": <0.0-1.0>
      }

      If the event is NOT present, return:
      {
        "detected": false,
        "instances": [],
        "summary": "No {{ event_name }} detected in the video.",
        "confidence": 0.0
      }

      IMPORTANT: All text fields "description", "reasoning", and "summary" must be written in Chinese (中文).

      Be conservative - only report what you are reasonably confident about.

  # ---------------------------------------------------------------------------
  # Emergency Lane Location
  # ---------------------------------------------------------------------------
  - template_id: "emergency_lane_location"
    name: "Emergency Lane Location"
    system_prompt: |
      Identify emergency lane(s) in highway surveillance video.
    user_prompt: |
      Look at these video frames and identify any emergency lanes (also called hard shoulders or breakdown lanes).

      Emergency lane characteristics:
      - Located on far left or far right edge of roadway
      - Often different colored pavement or texture
      - Marked with solid white lines, hatched markings, or thicker boundary lines
      - Usually narrower than standard lanes
      - May have "Emergency Lane" or "No Stopping" signage

      Return ONLY a JSON object in this exact format (no markdown, no extra text):
      {
        "emergency_lanes": [
          {
            "lane_id": <int>,
            "side": "<left|right>",
            "bbox": [<x1, y1, x2, y2>],
            "confidence": <0.0-1.0>
          }
        ],
        "confidence": <0.0-1.0>
      }

  # ---------------------------------------------------------------------------
  # Emergency Lane Vehicle Tracking
  # ---------------------------------------------------------------------------
  - template_id: "emergency_lane_vehicle_tracking"
    name: "Emergency Lane Vehicle Tracking"
    system_prompt: |
      Track vehicles that enter or occupy emergency lanes.
    user_prompt: |
      Known emergency lane regions:
      {{ emergency_lane_regions | tojson }}

      Examine these video frames and identify all vehicles that:
      1. Enter an emergency lane
      2. Stop or park in an emergency lane
      3. Travel in an emergency lane

      Return ONLY a JSON object in this exact format (no markdown, no extra text):
      {
        "vehicles": [
          {
            "vehicle_id": "<id>",
            "lane_id": <int>,
            "behavior": "<entering|stopping|traveling|parking>",
            "start_time_sec": <float>,
            "end_time_sec": <float>,
            "confidence": <0.0-1.0>
          }
        ]
      }

  # ---------------------------------------------------------------------------
  # Lane Marking Identification
  # ---------------------------------------------------------------------------
  - template_id: "lane_marking_identification"
    name: "Lane Marking Identification"
    system_prompt: |
      Identify and classify lane markings in highway video.
    user_prompt: |
      Examine these video frames and identify all lane markings.
      Classify each as "solid" or "dashed/broken".

      Solid lines indicate no lane changing zones.
      Dashed/broken lines indicate permitted lane changing zones.

      Return ONLY a JSON object in this exact format (no markdown, no extra text):
      {
        "lane_markings": [
          {
            "line_id": <int>,
            "type": "<solid|dashed>",
            "bbox": [<x1, y1, x2, y2>],
            "confidence": <0.0-1.0>
          }
        ]
      }

      If no lane markings are visible, return: {"lane_markings": []}

  # ---------------------------------------------------------------------------
  # Lane Change Tracking
  # ---------------------------------------------------------------------------
  - template_id: "lane_change_tracking"
    name: "Lane Change Tracking"
    system_prompt: |
      Track vehicle lane changes across frames.
    user_prompt: |
      Known lane markings:
      {{ lane_markings | tojson }}

      Examine these precision frames and track vehicles performing lane changes.
      For each lane change, note:
      - Vehicle identification
      - Starting lane and ending lane
      - Position where the vehicle crossed the lane line
      - Timestamp

      Return ONLY a JSON object in this exact format (no markdown, no extra text):
      {
        "lane_changes": [
          {
            "vehicle_id": "<id>",
            "from_lane": <int>,
            "to_lane": <int>,
            "cross_position": [<x, y>],
            "time_sec": <float>,
            "confidence": <0.0-1.0>
          }
        ]
      }

      If no lane changes are detected, return: {"lane_changes": []}

  # ---------------------------------------------------------------------------
  # Report Generation (Overall Traffic Summary)
  # ---------------------------------------------------------------------------

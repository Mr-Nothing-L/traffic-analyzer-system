# =============================================================================
# Prompt Templates Configuration
# =============================================================================
# Reusable prompt templates for VLM calls.
# Each template uses Jinja2 syntax for variable substitution.
#
# 模板顺序与 event_categories.yaml 中的 event_id 对应：
#   1. scene_understanding — 先验知识生成参考（v2.0.0 不再被 pipeline 自动调用）
#   2. illegal_parking_detection — event_id 0
#   3. emergency_lane_occupancy_detection — event_id 1
#   4. traffic_accident_detection — event_id 2
#   5. pedestrian_detection — event_id 3
#   6. non_motor_vehicle_detection — event_id 4
#   7. heavy_congestion_detection — event_id 5
#   8. road_construction_detection — event_id 6
#   9. direct_reversing_detection — event_id 7
#   10. thrown_object_detection — event_id 8
#   11. lane_change_solid_detection — event_id 9 (is_active=false)
# =============================================================================

prompt_templates:
  # ---------------------------------------------------------------------------
  # 1. Scene Understanding — 先验知识（纯规则，不生成 JSON）
  # ---------------------------------------------------------------------------

  - template_id: "scene_understanding"
    name: "场景先验规则"
    system_prompt: |
      你正在分析中国高速公路监控画面。以下规则是所有事件检测的前提，分析车辆行为前必须先确定道路结构和流向。
    user_prompt: |
      =============================================================================
      方向判定规则（直接应用，不要重新推断）
      =============================================================================

      默认假设 — 双向主路+中央隔离带（中国高速公路最常见）：
      - 画面有两条被中央隔离带（护栏/绿化带/混凝土墩）分隔的主路：
        - 左侧道路（画面左半）：来向车流，车辆从画面上方来、向画面下方去 → 朝向摄像头（逐渐变大） → normal_direction = "toward_bottom"
        - 右侧道路（画面右半）：去向车流，车辆从画面下方来、向画面上方去 → 远离摄像头（逐渐变小） → normal_direction = "toward_top"
      - 除非看到明确相反证据，否则直接使用此默认。

      匝道：
      - 匝道方向 = 其所连接主路的方向。
      - 匝道在画面左侧 → 同左侧主路 = toward_bottom
      - 匝道在画面右侧 → 同右侧主路 = toward_top

      单条道路（无中央隔离带）：
      - 只有一条主路或一条匝道时，通过车辆大小变化判断：
        - 向画面下方移动 + 变大 → toward_bottom（靠近摄像头）
        - 向画面上方移动 + 变大 → toward_top（靠近摄像头，罕见）

      摄像头视角速查：
      - 画面上方 = 远处（车小）    画面下方 = 近处（车大）
      - toward_bottom = 上→下移动 = 靠近摄像头 = 车变大
      - toward_top    = 下→上移动 = 远离摄像头 = 车变小

      =============================================================================
      应急车道识别规则
      =============================================================================

      核心原则：以视觉特征（白色实线分隔 + 最外侧）为主，位置规则为辅。

      位置规则（相对中央隔离带，非绝对画面边缘）：
      - 应急车道始终在每条道路的"外侧边缘"（离中央隔离带最远的一侧）。
      - 中国高速公路为右行制：
        - 左侧主路（toward_bottom）：中央隔离带在右，应急车道在该道路的最左侧。
        - 右侧主路（toward_top）：中央隔离带在左，应急车道在该道路的最右侧。
        - 匝道出入口处车道结构复杂，不要仅凭"画面最左/最右"判断，必须以白色实线分隔为准。

      匝道出入口特殊判断：
      - 匝道出入口可能有加速车道、减速车道、导流区并存。
      - 网状实线（导流区）属于应急车道范围。
      - 白色实线分隔的最外侧车道才是应急车道——即使旁边还有匝道/加速车道，也不改变这条规则。

      视觉特征（满足任意一条即可确认）：
      - 位于道路最外侧，在最后一条主车道之外，紧挨护栏。
      - 与主车道由白色实线分隔（不是虚线、不是渐变段）。
      - 有隆声带、凸起标线或"应急车道"标志。
      - 匝道出入口处的白色/黄色网状实线导流区属于应急车道。

      排除项：
      - 两条主车道之间的白虚线/实线 = 车道边界，不是应急车道。
      - 加速/减速车道（白色虚线或渐变段分隔的汇入/汇出车道）= 正常车道，不是应急车道。
      - 锥桶临时封闭区域 ≠ 应急车道。
      - 收费站/服务区宽路肩 ≠ 应急车道。


  # ---------------------------------------------------------------------------
  # 2. Illegal Parking Detection (event_id=0)
  # Purpose: Dedicated direct VLM detection for illegal parking events.
  # ---------------------------------------------------------------------------
  - template_id: "illegal_parking_detection"
    name: "Illegal Parking Detection"
    system_prompt: |
      你是一名专业的高速公路交通监控分析师。你的任务是检测视频中的违法停车事件。
    user_prompt: |
      检测这些视频帧中的违法停车事件。

      定义 — 违法停车：
      违法停车是指机动车在禁止停车的区域处于静止或停放状态的行为。以下情况均属于违法停车：
      - 车辆在行车道（主车道）上静止或停放
      - 车辆在应急车道上静止或停放
      - 车辆在导流区（匝道出入口处的白色/黄色网状实线区域）内静止或停放
      - 车辆在路肩区域静止或停放
      - 施工区域内的车辆停车施工（施工区域内车辆停车施工是违法停车的一种特殊情况，必须标注）
      - 车辆在路肩，路边，压路边实线停车也要标注违法停车

      检查步骤：
      1. 扫描视频帧，识别画面中的每一辆机动车。
      2. 对每辆候选机动车执行静止判定：
         a. **选帧对比**：选择该车最早可见帧和最晚可见帧。
         b. **像素位移估计**：
            - 选取可识别的特征点，估算早帧和晚帧中的坐标（画面百分比）。
            - 计算位移Δx、Δy和幅值，判断显著性（|Δx|或|Δy|超过3%画面尺寸，或幅值超过2%画面对角线为significant，否则为negligible）。
            - 记录：pixel_displacement_estimate = {"delta_x_pct": float, "delta_y_pct": float, "magnitude_pct": float, "vehicle_width_pct": float, "vehicle_height_pct": float, "significance": "significant|negligible"}
         c. **固定参照物位置变化**：描述车辆相对于路面标线、护栏、隔离带、交通锥等固定物体的位置变化。
         d. **帧间一致性检查**：检查中间帧中该车辆的位置，确认位移方向是否一致。
      3. 确认静止车辆所在区域（行车道、应急车道、导流区、路肩）。
      4. 排除非机动车：确认静止车辆是机动车，而非摩托车、电动自行车、自行车。
      5. 施工区域特殊处理：施工区域内的车辆停车需标注为违法停车。

      返回 JSON：
      {
        "detected": <true|false>,
        "instances": [
          {
            "start_time_sec": <大致开始时间（秒）>,
            "end_time_sec": <大致结束时间（秒）>,
            "evidence_frames": [<帧索引>],
            "description": "<观察到的内容：车辆类型、颜色、停放位置、状态描述>",
            "reasoning": "<简要说明：车辆类型确认、静止判断方法（对比帧号/像素位移结果）、所在区域、排除规则检查结果>"
            "pixel_displacement_estimate": {
              "delta_x_pct": <float>,
              "delta_y_pct": <float>,
              "magnitude_pct": <float>,
              "vehicle_width_pct": <float>,
              "vehicle_height_pct": <float>,
              "significance": "significant|negligible"
            }
          }
        ],
        "summary": "<总体评估：共检测到几辆违法停车车辆，分别位于什么位置，有无特殊情况>"
      }

      如果未检测到违法停车，返回：
      {
        "detected": false,
        "instances": [],
        "summary": "未检测到违法停车。所有车辆在移动中，或静止车辆为非机动车/交通事故。"
      }

      重要：
      - 所有文本字段 "description"、"reasoning" 和 "summary" 必须使用中文书写。
      - 务必保守。如果无法确定车辆是否静止，宁可不报告也不要误报。
      - 静止判断以相对于路面固定参照物的位置变化为准。
      - 即使车辆看起来很小（远距离）也要检查。

      关键 — 像素位移是静止判定的主要证据：
      - 像素位移为 "negligible" 时，即使主观印象觉得车辆在动，也**必须判定为静止**。
      - 像素位移为 "significant" 时，即使车辆看起来没动，也**不能判定为静止/停放**。
      - 当像素位移与视觉印象冲突时，**相信像素位移**。
    output_format_hint: "JSON"

  # ---------------------------------------------------------------------------
  # 3. Emergency Lane Occupancy Detection (event_id=1)
  # ---------------------------------------------------------------------------
  - template_id: "emergency_lane_occupancy_detection"
    name: "应急车道占用检测"
    system_prompt: |
      你是一名交通监控分析师。你的唯一任务是检测应急车道上的车辆占用情况。
    user_prompt: |
      检测这些视频帧中的应急车道占用情况。

      定义 — 应急车道占用：
      应急车道（路肩）是高速公路最外侧的专用车道，通常用于紧急停车。以下情况均属于应急车道占用：
      - 任何车辆在应急车道上行驶（无论速度多慢）
      - 任何车辆在应急车道上停止或停放
      - 任何车辆部分或完全进入应急车道区域
      - 主路之间的导流分隔带属于应急车道（路肩）范围，该区域内的车辆计入应急车道占用

      关键正例 — 以下情况**属于**应急车道占用：
      - 工程车、养护车、清扫车、救援车等单独在应急车道上行驶/停放，周围无锥桶、无施工标志牌、无施工作业迹象 → **必须判定为占用**。
      - 只要车辆在应急车道上，且不在施工区域内、不涉及交通事故，无论车辆类型都计入占用。

      检查步骤：
      1. 根据已知场景信息或画面自行判断应急车道位置。
      2. 检查应急车道区域（通常在画面最左或最右侧，紧挨护栏），注意远距离目标和部分压线车辆。
      3. 对发现的每一辆应急车道上的车辆：
         a. 记录车辆类型、颜色、位置和行为（行驶/停止/停放/部分进入）。

      返回 JSON：
      {
        "detected": <true|false>,
        "instances": [
          {
            "start_time_sec": <大致开始时间>,
            "end_time_sec": <大致结束时间>,
            "evidence_frames": [<帧索引>],
            "description": "<观察到的内容：车辆类型、颜色、在应急车道上的行为>",
            "reasoning": "<简要说明：车辆位置和行为>"
          }
        ],
        "summary": "<总体评估>"
      }

      如果未检测到应急车道占用，返回：
      {
        "detected": false,
        "instances": [],
        "summary": "未检测到应急车道占用。"
      }

      重要：
      - 所有文本字段 "description"、"reasoning" 和 "summary" 必须使用中文书写。
      - 即使只有一辆车部分进入应急车道，也必须报告 detected=true。
      - 如果应急车道上有车辆但你不确定它是否在应急车道内，宁可报告 detected=true 也不要遗漏。

  # ---------------------------------------------------------------------------
  # 4. Traffic Accident Detection (event_id=2)
  # ---------------------------------------------------------------------------
  - template_id: "traffic_accident_detection"
    name: "交通事故检测"
    system_prompt: |
      你是一名专业的高速公路交通监控分析师。你的任务是检测视频中的交通事故事件。
    user_prompt: |
      检测这些视频帧中的交通事故事件。

      定义 — 交通事故：
      交通事故是指在高速公路上发生的涉及车辆损坏、人员伤亡或道路障碍的突发事件。以下情况均属于交通事故：
      - **车辆碰撞**：追尾、侧面碰撞、多车连环相撞、刮擦等
      - **道路散落物/障碍物**：因事故产生的车辆碎片、货物散落等阻塞车道
      - **车辆翻车/侧翻**：车辆翻倒、侧翻、仰翻
      - **车辆起火/冒烟**：车辆燃烧、冒烟、有明火


      检查步骤：
      1. 扫描视频帧，寻找事故视觉特征：车辆损坏、异常姿态、烟雾火焰、散落物、多车聚集、救援车辆到场。
      2. 对疑似事故确认：是否真事故（排除正常停车）、事故类型、涉及车辆、是否阻塞车道。
      3. 有救援车辆但看不到事故本身时谨慎判断。

      返回 JSON：
      {
        "detected": <true|false>,
        "instances": [
          {
            "start_time_sec": <大致开始时间（秒）>,
            "end_time_sec": <大致结束时间（秒）>,
            "evidence_frames": [<帧索引>],
            "description": "<观察到的内容：事故类型、涉及车辆、损坏程度、位置>",
            "reasoning": "<简要说明：看到的视觉证据、事故类型判断>"
          }
        ],
        "summary": "<总体评估：事故严重程度、影响范围、涉及车辆数>"
      }

      如果未检测到交通事故，返回：
      {
        "detected": false,
        "instances": [],
        "summary": "未检测到交通事故。"
      }

      重要：
      - 所有文本字段 "description"、"reasoning" 和 "summary" 必须使用中文书写。
      - 务必保守。仅在看到明确的损坏、烟雾、翻车、散落物等证据时才报告。
      - 救援车辆到场本身不是事故证据，需结合其他视觉线索判断。
    output_format_hint: "JSON"

  # ---------------------------------------------------------------------------
  # 5. Pedestrian Detection (event_id=3)
  # ---------------------------------------------------------------------------
  - template_id: "pedestrian_detection"
    name: "Pedestrian Detection"
    system_prompt: |
      你是一名专业的高速公路交通监控分析师。你的任务是检测视频中高速公路上的行人。
    user_prompt: |
      检测这些视频帧中高速公路上的行人。

      定义 — 高速公路行人出现：
      高速公路是禁止行人进入的封闭交通区域。以下情况均属于高速公路行人出现事件（人员必须实际站在路面或路肩上，站在车辆上未落地不算）：
      - **行人**：在高速公路车道、路肩、中央隔离带、匝道等**路面**上行走或站立的普通人
      - **穿越高速公路者**：试图横穿高速公路车道的人员

      常见误报源识别：
      - **路侧标志牌**：固定不动的矩形物体，通常有文字或图案
      - **桥梁阴影**：横跨画面的深色阴影带，随时间缓慢移动
      - **植被/树木**：在画面边缘摇摆的植物，通常有绿色或棕色
      - **中央隔离带护栏反光片**：规则排列的小型反光点
      - **动物**：四足行走的动物不属于行人事件（但可能触发交通事故）

      检查步骤：
      1. 扫描视频帧，寻找人形轮廓。
      2. 对每个人形轮廓确认：是否真人类、是否在路面/路肩上（站在车上未落地则排除）、是否施工区域人员。
      3. 描述行人的位置、行为、穿着特征。注意远距离和部分遮挡目标。

      返回 JSON：
      {
        "detected": <true|false>,
        "instances": [
          {
            "start_time_sec": <大致开始时间（秒）>,
            "end_time_sec": <大致结束时间（秒）>,
            "evidence_frames": [<帧索引>],
            "description": "<观察到的内容：行人位置、行为、穿着、人数>",
            "reasoning": "<简要说明：人形特征确认、位置>"
          }
        ],
        "summary": "<总体评估：共发现多少行人，分布在什么位置，有无危险行为>"
      }

      如果未检测到行人，返回：
      {
        "detected": false,
        "instances": [],
        "summary": "未检测到高速公路行人。"
      }

      重要：
      - 所有文本字段 "description"、"reasoning" 和 "summary" 必须使用中文书写。
      - 务必保守。如果无法确定是否为人形（例如距离太远、画面模糊），宁可不报告也不要误报。
      - 特别注意区分行人和施工人员：施工人员通常穿着高可视性服装且位于施工区域内。
      - 即使只有一个人也要报告 detected=true。
    output_format_hint: "JSON"

  # ---------------------------------------------------------------------------
  # 6. Non-motor / Two-wheel Vehicle Detection (event_id=4)
  # ---------------------------------------------------------------------------
  - template_id: "non_motor_vehicle_detection"
    name: "Non-motor Vehicle Detection"
    system_prompt: |
      你是一名专业的高速公路交通监控分析师。你的任务是检测视频中高速公路上的非机动车及小型两轮、三轮或低速骑行/代步车辆。
    user_prompt: |
      检测这些视频帧中高速公路上的非机动车及小型两轮、三轮或低速骑行/代步车辆。

      定义 — 非机动车及两轮/三轮小型车辆出现：
      本模板用于检测高速公路上不属于常规汽车车流的小型两轮、三轮或低速骑行/代步车辆，包括摩托车。以下情况均属于本事件：
      - 摩托车，包括两轮摩托车、三轮摩托车、重型机车
      - 电动自行车 / 电瓶车
      - 自行车
      - 人力三轮车
      - 电动三轮车
      - 滑板车、平衡车等小型代步工具
      - 其他明显不属于轿车、SUV、货车、客车、工程车的两轮或三轮车辆
      - 远距离或画面边缘处的小型两轮/三轮目标，即使只清楚看到骑手轮廓、车灯、车把或窄小车身，也属于候选目标。
      - 视频开头或结尾短暂出现的两轮/三轮目标，只要具备车辆运动特征，也必须计入。
      - 上述车辆在高速公路车道、应急车道、路肩、匝道、中央隔离带附近或车流间隙中行驶、停放、穿行或短暂出现。

      重要 — 以下情况要着重分析：
      - 不能因为目标位于画面左上角、上边缘、右上角、画面边缘、距离较远、只在开头几帧出现、车轮不完整可见，就判定为无。
      - 不能因为目标位于画面左下角、右下角、最后几帧才进入画面、只出现1–3帧，就判定为无。
      - 夜间小型两轮/三轮车辆可主要依据骑乘姿态、窄小车身、车灯和跨帧移动来识别，但不能仅凭单个亮点直接判定。
      - 远处小型两轮车常出现在画面上方、左上角、右上角、画面下方、左下角、右下角、中央隔离带附近、应急车道或道路边缘，必须重点检查。

      视觉特征：
      - 两轮或三轮结构、骑乘姿态、窄小车身、车把、单点/双点车灯、骑手头盔或骑手上半身轮廓，任意两项同时出现即可作为候选目标。
      - 夜间远距离目标不要求完整看清两个车轮；如果表现为单个或小型移动光源，需要结合骑乘姿态、窄小车身、与普通四轮车不同的细长轮廓或连续跨帧移动轨迹共同判断。
      - 可见骑乘者或驾驶者，通常呈骑坐姿态。
      - 车辆宽度窄，轮廓细长，车身尺寸明显小于轿车、货车、客车。
      - 可能在车流中穿行、沿路肩行驶、沿应急车道行驶、静止停放、横穿道路或从画面边缘短暂出现。
      - 远距离目标可能很小，需要检查画面边缘、角落、上边缘、下边缘和远处区域。
      - 运动速度通常高于行人，但可能低于普通机动车；不能仅因速度较慢而排除。

      检查步骤：
      1. 扫描视频帧，寻找两轮、三轮或小型代步车辆。
      2. 重点检查画面角落、边缘、应急车道、中央隔离带附近，以及视频首尾帧。
      3. 对候选目标判断：是否属于本事件范围、车辆类型、位置、运动状态，排除行人/施工设备/普通机动车/标志牌等误报源。
      4. 即使目标很小、距离远、只出现在边缘或首尾帧，也要检查。
      5. 无法精确区分类型时，可报告为 unknown_two_wheel_or_three_wheel 并说明原因。

      返回 JSON：
      {
        "detected": <true|false>,
        "instances": [
          {
            "start_time_sec": <大致开始时间（秒）>,
            "end_time_sec": <大致结束时间（秒）>,
            "evidence_frames": [<帧索引>],
            "vehicle_type": "<motorcycle|electric_bicycle|bicycle|tricycle|electric_tricycle|scooter|unknown_two_wheel_or_three_wheel>",
            "position": "<所在位置描述>",
            "motion_state": "<moving|stationary|parking|crossing|wrong_direction|unknown>",
            "description": "<观察到的内容：车辆类型、颜色、位置、状态、骑乘者特征>",
            "reasoning": "<简要说明：两轮/三轮结构判断依据、车身尺寸、骑乘姿态、位置、运动状态、排除误报源的理由>"
          }
        ],
        "summary": "<总体评估：共发现多少辆非机动车或两轮/三轮异常车辆，分别是什么类型，位于什么位置>"
      }

      如果未检测到，返回：
      {
        "detected": false,
        "instances": [],
        "summary": "未检测到非机动车及两轮/三轮异常车辆。"
      }

      重要：
      - 所有文本字段 "description"、"reasoning" 和 "summary" 必须使用中文书写。
      - 务必保守。不要把普通机动车、行人、标志牌、阴影、施工设备误判为本事件。
      - 即使只有一辆目标车辆，也要报告 detected=true。
    output_format_hint: "JSON"

  # ---------------------------------------------------------------------------
  # 7. Heavy Congestion Detection (event_id=5)
  # ---------------------------------------------------------------------------
  - template_id: "heavy_congestion_detection"
    name: "严重拥堵检测"
    system_prompt: |
      你是一名交通监控分析师。你的任务是检测高速公路上的严重交通拥堵事件。
    user_prompt: |
      检测这些视频帧中是否存在交通拥堵。

      定义 — 交通拥堵：
      交通拥堵是指高速公路上的车辆通行能力显著下降、车速明显降低、车辆排队长度较长的交通状态。与正常车流密集不同，拥堵具有以下特征：
      - 车辆平均速度相比正常高速公路通行速度显著降低（如降至30km/h以下或接近停滞）
      - 车辆密度极高，车间距极小（车头时距明显小于正常跟车距离）
      - 出现明显的走走停停（stop-and-go）交通模式
      - 单/多车道车辆排队长度延伸较远，形成长队列
      - 车道占有率远超正常通行能力
      - 车辆在多车道上均呈现缓慢移动或静止状态

      视觉特征（必须综合判断）：
      - 车辆密度高，几乎首尾相接
      - 车辆间距小，几乎没有超车空间
      - 走走停停模式：部分帧中车辆静止，部分帧中缓慢移动
      - 车辆队列向画面远处延伸，排队长度较长
      - 多/单车道出现缓慢通行

      重要 — 区分规则（必须严格遵守）：
      2. **严重拥堵的核心判断标准**：车速明显下降（视觉上车辆移动极其缓慢或几乎停滞）+ 车辆排队延伸较远。两者缺一不可。
      5. **单车道缓慢 = 拥堵**：仅单车道车辆缓慢而其他车道通行正常，判定为严重拥堵。

      检查步骤：
      1. 观察所有车道的车辆运动状态。
      2. 对比早帧和晚帧中同一车辆的位置变化，判断车辆是否停滞或极低速。
      3. 观察车辆队列长度和多车道状态。
      4. 综合判断是否为拥堵，**单个车道拥堵也属于拥堵事件**。

      返回 JSON：
      {
        "detected": <true|false>,
        "instances": [
          {
            "start_time_sec": <float>,
            "end_time_sec": <float>,
            "evidence_frames": [<int>],
            "description": "<中文描述：拥堵位置、涉及车道、排队长度、车辆状态等>",
            "reasoning": "<简要说明：车速观察结果、排队长度、涉及车道、是否排除事故导致的拥堵>"
          }
        ],
        "summary": "<中文总体评估：是否检测到严重拥堵，拥堵程度描述，涉及范围>"
      }

      如果未检测到严重交通拥堵，返回：
      {
        "detected": false,
        "instances": [],
        "summary": "未检测到严重交通拥堵。"
      }

      重要：
      - 所有文本字段 "description"、"reasoning" 和 "summary" 必须使用中文书写。
      - 保持保守。仅在确信车速明显下降且排队较长时才报告严重拥堵。
      - 事故导致的拥堵不要重复标注。
    output_format_hint: "JSON"

  # ---------------------------------------------------------------------------
  # 8. Road Construction Detection (event_id=6)
  # ---------------------------------------------------------------------------
  - template_id: "road_construction_detection"
    name: "道路施工检测"
    system_prompt: |
      你是一名交通监控分析师。检测活跃的道路施工或维护作业区。
    user_prompt: |
      检测这些视频帧中的道路施工/维护作业区。

      定义 — 以下任一情况均认定为道路施工：
      (A) **可见的交通锥或隔离栏布置**（形成作业区、车道封闭或交通引导区域），并且**至少满足以下一项**：
          - 穿着高可视性服装的工人（橙色、黄色或荧光绿色背心/帽子）
          - 工程/施工车辆或设备（沥青摊铺机、压路机、水泥搅拌车、挖掘机、自卸卡车、起重机等）
          - 由锥桶/隔离栏布置明确指示的车道封闭或交通引导（区域封闭，引导）
      (B) 在路面上进行**施工作业**的重型设备（如沥青摊铺、路面铣刨、标线施划、放置路锥等，即使没有锥桶，例如夜间铺设仅靠车载箭头板指示）。


      返回 JSON：
      {
        "detected": <true|false>,
        "instances": [
          {
            "start_time_sec": <大致开始时间>,
            "end_time_sec": <大致结束时间>,
            "evidence_frames": [<帧索引>],
            "description": "<观察到的内容：工人、设备、锥桶布置>",
            "reasoning": "<简要说明：看到的施工特征（锥桶/工人/设备）和缺失项，判定为施工或非施工的理由>"
          }
        ],
        "summary": "<总体评估>"
      }

      如果事件中**不存在**施工，返回：
      {
        "detected": false,
        "instances": [],
        "summary": "未检测到道路施工。"
      }

      重要：
      - 所有文本字段 "description"、"reasoning" 和 "summary" 必须使用中文书写。
      - 务必保守。如果不确定是施工还是日常清洁，报告 detected=false 并说明原因。

  # ---------------------------------------------------------------------------
  # 9. Direct Reversing Detection (event_id=7, logic_chain)
  # ---------------------------------------------------------------------------
  - template_id: "direct_reversing_detection"
    name: "直接逆行/倒车检测"
    system_prompt: |
      你是一名交通监控分析师。你的任务是检测正在倒车或逆行的车辆。
    user_prompt: |
      上面提供的图片就是你必须分析的视频帧。你可以看到它们——不要声称无法查看图片。将你的全部分析基于这些帧。

      检查来自高速公路监控摄像头的这些视频帧。

      =============================================================================
      时间戳与帧序说明
      =============================================================================

      每帧画面右上角（或左上角）带有监控时间戳水印（例如 "2025-06-08 23:59:23" 或 "14:59:40"）。
      - 读取这些时间戳以确定帧的实际时间顺序。
      - 选择时间跨度最大的 2-3 帧进行对比（优先选最早和最晚的清晰帧）。
      - 记录对比时用到的具体时间戳（如 "14:59:40 → 15:00:09"）。

      =============================================================================
      检测任务：识别移动方向与车道正常流向相反的车辆
      =============================================================================

      对每辆候选车辆，执行以下双重检测路径（满足任一即判定）：

      ─────────────────────────────────────────────────────────────────────────────
      路径 A：车头朝向 vs 正常流向（静态特征，可靠）
      ─────────────────────────────────────────────────────────────────────────────
      1. 观察车辆的前脸/车头朝向：
         - 车头朝向画面下方（toward_bottom）= 车辆正在靠近摄像头
         - 车头朝向画面上方（toward_top）= 车辆正在远离摄像头
      2. 对比该车所在道路的正常流向（以先验规则为准：左侧道路 toward_bottom，右侧道路 toward_top）：
         - 如果车头朝向 与 正常流向 相反 → 判定为**逆行（WRONG-WAY）**
         - 示例：白色轿车位于左侧道路，正常流向为 toward_bottom（靠近摄像头），但车头朝向画面上方（toward_top，远离摄像头）→ 车头朝向与正常流向相反，判定为逆行

      ─────────────────────────────────────────────────────────────────────────────
      路径 B：帧间位置对比（动态特征，利用时间戳，必须执行）
      ─────────────────────────────────────────────────────────────────────────────
      检查步骤：
      1. 扫描视频帧，识别画面中的每一辆机动车。
      2. 对每辆候选机动车执行静止判定：
         a. **选帧对比**：选择该车最早可见帧和最晚可见帧。
         b. **像素位移估计**：
            - 选取可识别的特征点，估算早帧和晚帧中的坐标（画面百分比）。
            - 计算位移Δx、Δy和幅值，判断显著性（|Δx|或|Δy|超过3%画面尺寸，或幅值超过2%画面对角线为significant，否则为negligible）。
            - 记录：pixel_displacement_estimate = {"delta_x_pct": float, "delta_y_pct": float, "magnitude_pct": float, "vehicle_width_pct": float, "vehicle_height_pct": float, "significance": "significant|negligible"}
         c. **固定参照物位置变化**：描述车辆相对于路面标线、护栏、隔离带、交通锥等固定物体的位置变化。
         d. **帧间一致性检查**：检查中间帧中该车辆的位置，确认位移方向是否一致。
      3. 对比该车所在道路的正常流向（以先验规则为准：左侧道路 toward_bottom，右侧道路 toward_top）：
          - 如果位移方向与正常流向相反，判定为**逆行（WRONG-WAY）**
          - 示例：白色轿车位于左侧道路，正常流向为 toward_bottom（靠近摄像头），但位移向画面上方（toward_top，远离摄像头）→ 位移方向与正常流向相反，判定为逆行
      ─────────────────────────────────────────────────────────────────────────────
      两种路径的优先级
      ─────────────────────────────────────────────────────────────────────────────
      - 路径A（车头朝向）优先级高于路径B（帧间位置）。
      - 只要路径A满足条件，无论路径B结果如何，都判定为逆行/倒车。
      - 路径A不满足时，再用路径B辅助判断。
      - 两路径都满足时， confidence 取较高值。


      检测到逆行/倒车时：
      {
        "detected": true,
        "confidence": 0.85,
        "summary": "检测到1辆逆行车辆：白色轿车在左侧道路逆向行驶。",
        "instances": [
          {
            "start_time_sec": 0.0,
            "end_time_sec": 10.0,
            "evidence_frames": [0, 5],
            "time_span": "14:59:40 → 15:00:09",
            "description": "白色轿车在左侧道路逆向行驶",
            "reasoning": "路径A：白色轿车车头朝向画面下方（toward_bottom，靠近摄像头），但左侧道路正常流向为toward_top（远离摄像头）。车头朝向与正常流向相反，判定为逆行。"
          }
        ]
      }

      未检测到时：
      {
        "detected": false,
        "confidence": 0.0,
        "summary": "未检测到逆行/倒车行为。所有车辆车头朝向与正常流向一致，帧间位置趋势也符合正常流向。",
        "instances": []
      }


  # ---------------------------------------------------------------------------
  # 10. Thrown Object Detection (event_id=8)
  # ---------------------------------------------------------------------------
  - template_id: "thrown_object_detection"
    name: "抛洒物检测"
    system_prompt: |
      你是一名交通监控分析师。你的任务是检测车道内可能影响车辆正常通行的抛洒物。
    user_prompt: |
      检测这些视频帧中的抛洒物（遗落至车道内的异物）。

      定义 — 抛洒物：
      抛洒物是指遗落、掉落或抛洒至高速公路车道内，可能对车辆正常通行造成干扰或安全隐患的物体。抛洒物可以是静止在路面上的，也可以是正在空中飘落的。

      抛洒物包括但不限于：
      - 塑料袋、编织袋、纸张、布料等轻质物品
      - 瓶子、罐子、包装盒等容器类物品
      - 木板、金属片、轮胎碎片等硬质物品
      - 泥土、砂石、建筑材料等散状物品
      - 衣物、被褥、绳索等其他杂物
      - 任何不属于道路正常组成部分的异物

      视觉特征：
      - 车道内出现与路面颜色/纹理明显不同的异物
      - 车道内有反光、飘动、滚动或静止的异常物体
      - 空中飘落的物品（塑料袋、纸张等）
      - 车辆附近突然出现的飞溅物或掉落物

      重要 — 包含规则（以下情况按抛洒物处理）：
      1. **三角警示牌等标识牌的异常状态**：三角牌、警示牌等在无提醒作用时按抛洒物处理。例如：倒在地上、不在事故车辆后方正常放置、被风吹倒等。
      2. **施工物品散落至施工区域外**：施工时的物品（如锥桶、施工标志牌、工具等）如果散落到施工区域以外的车道内，按抛洒物处理。
      3. **小动物/牲畜**：进入车道内的动物按抛洒物处理。

      检查步骤：
      1. 扫描各车道路面区域（包括中央、分界线附近、远处、边缘、车辆前后），寻找与路面颜色/纹理不一致的异物。
      2. 帧间对比：观察物体是否位置变化、突然出现或消失。
      3. 注意小目标（可能只有10x10像素），关注颜色/纹理/形状/运动异常。
      4. 排除正常设施（路面标线、井盖、排水口等）。

      返回 JSON：
      {
        "detected": <true|false>,
        "instances": [
          {
            "start_time_sec": <float>,
            "end_time_sec": <float>,
            "evidence_frames": [<int>],
            "description": "<中文描述：抛洒物类型、颜色、大小、所在车道位置、状态（静止/滚动/飘落等）>",
            "reasoning": "<简要说明：发现位置、与路面差异特征、帧间变化>"
          }
        ],
        "summary": "<中文总体评估：是否检测到抛洒物，涉及数量和类型，对交通的潜在影响>"
      }

      如果未检测到抛洒物，返回：
      {
        "detected": false,
        "instances": [],
        "summary": "未检测到抛洒物。"
      }

      重要：
      - 所有文本字段 "description"、"reasoning" 和 "summary" 必须使用中文书写。
      - 即使只有很小的可疑物体，也要报告 detected=true。
      - 抛洒物通常很小，在720p缩放下可能只有10x10像素，需要特别注意。
    output_format_hint: "JSON"

  # ---------------------------------------------------------------------------
  # 11. Lane Change on Solid Line Detection (event_id=9, is_active=false)
  # ---------------------------------------------------------------------------
  - template_id: "lane_change_solid_detection"
    name: "实线变道检测"
    system_prompt: |
      你是一名交通监控分析师。你的任务是检测车辆跨越实线变道的违规行为。
    user_prompt: |
      检测这些视频帧中是否存在车辆跨越实线（白色或黄色实线）变道的违规行为。

      定义 — 实线变道违规：
      实线变道违规是指车辆在行驶过程中，主动跨越禁止变道的实线标线（白色实线或黄色实线）从一个车道驶入另一个车道的行为。

      车道标线类型说明：
      - **实线（白色或黄色）**：表示禁止变道区域，车辆不得跨越实线变道。
      - **虚线/断续线（白色）**：表示允许变道区域，车辆在确保安全的前提下可以变道。
      - **虚实线（一侧实线一侧虚线）**：虚线侧车辆可以变道，实线侧车辆禁止变道。
      - **导流线（V形/斜线填充区域）**：属于禁止压线区域，车辆不得压越导流线。

      视觉特征：
      - 车辆从一条车道完整跨越至另一条车道
      - 车辆跨越的是白色或黄色实线（非虚线）
      - 车辆的行驶轨迹明显穿过实线标线
      - 变道过程中车辆有明显的横向位移

      重要 — 区分规则（必须严格遵守）：
      1. **正常行驶中的车轮偶尔压线 ≠ 实线变道**：
         - 车辆正常行驶时车轮短暂接触或略微压过车道线，但车身主体仍在原车道内 → **不判定**为实线变道。
         - 车辆因道路弯曲、避让障碍物等原因短暂压线但立即回到原车道 → **不判定**为实线变道。
         - 只有车辆**主动、完整地从一条车道跨越至另一条车道**才算实线变道。
      2. **虚线变道 ≠ 实线变道**：跨越虚线/断续线的正常变道**不判定**为违规。
      3. **导流线压越**：车辆压越或跨越导流线（V形/斜线填充区域）**判定**为实线变道违规。
      4. **应急车道边界实线**：从主车道跨越实线进入应急车道，或从应急车道跨越实线进入主车道，**判定**为实线变道违规。
      5. **匝道汇入/汇出**：匝道车辆汇入主路时跨越虚线或渐变段标线 → **不判定**为违规；但跨越实线强行汇入 → **判定**为违规。
      6. **多帧确认**：必须在多帧中观察到车辆从原车道完整进入目标车道，单帧中的疑似压线不足以判定。

      检查步骤：
      1. 识别画面中的所有车道标线，区分实线和虚线。
      2. 追踪每辆车的行驶轨迹，特别关注：
         - 车辆是否从一条车道移动到另一条车道
         - 跨越的是实线还是虚线
         - 变道是否完整（车身大部分进入新车道）
      3. 对疑似实线变道的车辆，执行以下验证：
         a. **起始帧**：记录车辆在原始车道的位置（车身主体在哪条车道）。
         b. **中间帧**：观察车辆是否正在跨越车道线，记录跨越的是实线还是虚线。
         c. **结束帧**：确认车辆是否已完整进入目标车道（车身主体在新车道内）。
         d. **排除正常压线**：如果车辆只是车轮短暂压线但车身仍在原车道 → 排除。
         e. **排除虚线变道**：确认跨越的是实线（连续不间断的线）而非虚线。
      4. 记录违规车辆的类型、颜色、所在道路、跨越的实线类型（白实线/黄实线/导流线）。

      返回 JSON：
      {
        "detected": <true|false>,
        "instances": [
          {
            "start_time_sec": <float>,
            "end_time_sec": <float>,
            "evidence_frames": [<int>],
            "description": "<中文描述：违规车辆类型、颜色、从哪条车道跨越至哪条车道、跨越的实线类型、所在道路>",
            "reasoning": "<简要说明：起始帧和结束帧车辆位置、跨越的标线类型（实线/虚线）、变道是否完整、排除正常压线的理由>"
          }
        ],
        "summary": "<中文总体评估：是否检测到实线变道违规，涉及车辆数量，违规类型分布>"
      }

      如果未检测到实线变道违规，返回：
      {
        "detected": false,
        "instances": [],
        "summary": "未检测到实线变道违规。"
      }

      重要：
      - 所有文本字段 "description"、"reasoning" 和 "summary" 必须使用中文书写。
      - 严格区分"正常行驶压线"和"主动变道跨越实线"，前者不判定为违规。
      - 注意导流线、虚实线等特殊标线情况。
      - 保持保守。仅在多帧确认车辆完整跨越实线变道后才报告。
    output_format_hint: "JSON"

  # ---------------------------------------------------------------------------
  # 12. Adjudication — 事件汇总裁决
  # ---------------------------------------------------------------------------
  - template_id: "adjudication"
    name: "事件汇总裁决"
    system_prompt: |
      你是一名专业的高速公路交通事件裁决专家。你的任务是基于10位专家Agent的初步检测结果、关键帧图像以及业务规则，对交通事件进行最终裁决。

      核心原则：
      1. 每位专家只负责事实识别（看到什么就报什么），不做排除判断。
      2. 同一份视觉证据只能对应一个最终事件（互斥原则）。
      3. 当专家报告与业务规则冲突时，以业务规则为准。
      4. 必须将排除原因记录在 audit_log 中，确保裁决过程可审计。
      5. 保持客观，仅依据视觉证据进行判断，不做主观推测。
      6. 专家权重特殊规则（event_id=7 保护规则）：
         - 车辆逆行/倒车专家（event_id=7）判定 detected=true 时，**不能因其他专家认为"车辆静止"或"位置未变"而排除逆行/倒车事件**。
         - 理由：静止与逆行/倒车行为不互斥——逆行车辆可能在逆行过程中暂时静止。
         - 但 event_id=7 的权重仅保护"逆行/倒车事件本身不被排除"，**不意味着逆行/倒车可以覆盖其他独立事件**。例如：
           - 一辆车在应急车道上逆向停放 → 同时触发"逆行/倒车"和"应急车道占用"，两者独立共存。
           - 一辆车违法停车且车头朝向与正常流向相反 → 同时触发"违法停车"和"逆行/倒车"，两者独立共存。
         - 唯一的排除例外：视频帧中明确显示车辆位于施工区域（有交通锥、施工标志、施工车辆、穿着高可视服装的工人等），此时可排除逆行/倒车。

      道路结构参考信息（供参考）：
      - 中国高速公路通常为双向分隔道路，由中央隔离带（护栏、栅栏、绿化带或混凝土隔离墩）分隔。
      - 应急车道位于每条道路的最外侧边缘（右行道路在右侧，左行道路在左侧）。
      - 施工区域通常有交通锥、警示标志、施工车辆等标识。
    user_prompt: |
      请对以下专家初步检测结果进行最终裁决。

      =============================================================================
      0. 场景先验知识（高速公路通用规则，直接应用）
      =============================================================================

      {{ scene_understanding }}

      =============================================================================
      1. 专家初步检测结果
      =============================================================================

      {{ candidates_json }}

      =============================================================================
      2. 业务规则
      =============================================================================

      {{ business_rules }}

      =============================================================================
      3. 标注规范（来自标注文档）
      =============================================================================

      {{ annotation_spec }}

      =============================================================================
      4. 裁决任务
      =============================================================================

      请基于以上专家检测结果和业务规则，做出最终裁决：

      裁决要求：
      1. 逐条审查每个事件的专家报告，判断是否符合业务规则。
      2. 对于同一视觉证据对应多个事件的情况，依据业务规则的优先级和互斥关系，保留最恰当的事件，排除其他事件。
      3. 对于被排除的事件，必须在 audit_log 中记录排除原因和引用的规则编号。
      4. 对于保留的事件，保持专家报告的原始描述（可根据规则适当调整）。
      5. 特别注意以下互斥与非互斥关系：
         - 【互斥】交通事故 vs 违法停车：同一区域的静止车辆，若属于事故场景，只保留交通事故。
         - 【互斥】施工区域 vs 应急车道占用/逆行/违停：施工区域内的车辆行为不触发占用/逆行/违停。
         - 【互斥】摩托车 vs 应急车道占用：同一辆摩托车不重复标记（但摩托车逆行仍可标记逆行）。
         - 【互斥】事故碎片 vs 抛洒物：事故现场的碎片由事故统一覆盖。
         - 【非互斥】应急车道静止：可同时触发违法停车和应急车道占用。
         - 【非互斥】逆行/倒车 vs 应急车道占用：车辆逆向停放在应急车道上 → 同时标记两个事件。
         - 【非互斥】逆行/倒车 vs 违法停车：车辆逆向违法停车 → 同时标记两个事件。
         - 【非互斥】专家权重规则 + CV证据权重：当CV检测到逆行运动时，不得用"静止"排除逆行；但逆行/倒车不覆盖其他独立事件。
      6. 专家权重一致性：当多个专家基于同一份视觉证据给出不同事件判定时，优先采信与该证据最直接相关的专家。例如，车辆碰撞损坏直接采信交通事故专家；两轮车辆直接采信摩托车专家。

      请按以下 JSON 格式输出裁决结果：
      {
        "event_results": [
          {
            "event_id": <int>,
            "event_name": "<事件名称>",
            "detected": <true|false>,
            "confidence": <float>,
            "summary": "<最终裁决摘要>",
            "instances": [
              {
                "start_time_sec": <float>,
                "end_time_sec": <float>,
                "evidence_frames": [<int>],
                "description": "<实例描述>",
                "reasoning": "<裁决理由>"
              }
            ]
          }
        ],
        "audit_log": [
          {
            "event_id": <int>,
            "event_name": "<事件名称>",
            "action": "excluded|included",
            "reason": "<排除或保留的详细原因>",
            "rule_id": "<引用的业务规则编号，若无则填 null>"
          }
        ],
        "adjudication_reasoning": "<总体裁决推理：说明整体判断逻辑、主要冲突如何解决、关键决策依据>",
        "reasoning_chain": [
          {
            "event_id": <int>,
            "event_name": "<事件名称>",
            "decision": "<保留/排除>",
            "thought_process": "<各个事件的思考过程>",
            "basis": "<引用的规则或证据>"
          }
        ]
      }

      重要：
      - 所有文本字段必须使用中文书写。
      - 保持客观，仅依据视觉证据和提供的业务规则进行判断。
      - audit_log 必须覆盖所有被排除的事件，不能遗漏。
      - 如果某个事件没有专家报告，则 detected=false，无需在 audit_log 中记录。
    output_format_hint: "JSON"

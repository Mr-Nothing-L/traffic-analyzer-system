# =============================================================================
# Prompt Templates Configuration
# =============================================================================
# Reusable prompt templates for VLM calls.
# Each template uses Jinja2 syntax for variable substitution.
# =============================================================================

prompt_templates:
  # ---------------------------------------------------------------------------
  # Scene Understanding
  # ---------------------------------------------------------------------------
  - template_id: "scene_understanding"
    name: "全局场景理解"
    system_prompt: |
      你是一名专业的高速公路监控分析师。分析来自高速公路监控摄像头的视频帧。
      提供场景的结构化分析。务必精确、客观。
    user_prompt: |
      分析这些来自高速公路监控摄像头的视频帧。

      图像按时间顺序从早到晚排列。
      每帧画面在右上角或左上角带有监控时间戳水印（例如 "2025-06-08 23:59:23" 或 "14:59:40"）。读取这些时间戳以确定时间顺序。

      描述车辆运动时，务必引用画面水印中的实际时间戳，例如 "14:59:40 → 15:00:09"。
      - 车辆从画面上方向下方移动表示向摄像头靠近（逐渐变大）。
      - 车辆从画面下方向上方移动表示远离摄像头（逐渐变小）。

      请按以下 JSON 格式提供分析结果：
      {
        "road_count": <不同道路/车道组的数量>,
        "roads": [
          {
            "road_id": <从0开始的索引>,
            "name": "<相对于摄像头的描述。示例：'左侧道路，车辆从画面顶部向底部行驶（从远到近）' 或 '右侧道路，车辆从画面底部向顶部行驶（从近到远）'。务必使用相对于摄像头/观察者的术语，并包含深度提示（从远到近 / 从近到远）。>",
            "normal_direction": "<toward_top|toward_bottom|toward_left|toward_right>",
            "direction_confidence": <0.0-1.0>,
            "direction_reasoning": "<一句说明应用了哪条规则>",
            "lane_count": <车道数量>,
            "has_emergency_lane": <true|false>,
            "emergency_lane_side": "<left|right|both|none>" — 对每条道路，明确指出应急车道在哪一侧。在中国高速公路上：应急车道通常位于每条道路的外侧边缘（右行道路在右侧，左行道路在左侧）。注意：路面颜色/纹理不同、白色实线标线、宽度较窄、路肩区域。
          }
        ],
        "weather": "<clear|rain|fog|snow|unknown>",
        "lighting": "<day|night|dusk|dawn|unknown>",
        "traffic_density": "<light|moderate|heavy>",
        "total_vehicles_estimate": <大致数量>,
        "scene_description": "<简要整体描述>",
        "pedestrian_present": <true|false>,
        "non_motor_vehicle_present": <true|false>,
        "thrown_object_present": <true|false>,
        "confidence": <0.0-1.0>
      }

      =============================================================================
      方向判定规则（应用这些规则，而非视觉运动分析）
      =============================================================================

      规则 1 — 双向主路+中央隔离带（中国高速公路默认情况）：
      - 如果视频显示两条由中央隔离带（护栏、栅栏、绿化带或混凝土隔离墩）分隔的主路：
        - 左侧道路（画面左侧道路）：来向车流，车辆朝向摄像头移动（从远到近，逐渐变大）→ normal_direction = "toward_bottom"
        - 右侧道路（画面右侧道路）：去向车流，车辆远离摄像头移动（从近到远，逐渐变小）→ normal_direction = "toward_top"
        - direction_confidence = 1.0
        - direction_reasoning = "双向主路+隔离带，默认左侧来向右侧去向"
      - 这是默认假设。仅当看到明确相反证据时才可覆盖。

      规则 2 — 匝道（入口/出口）：
      - 如果匝道汇入或驶出主路：
        - 匝道方向与其连接的主路方向相同。
        - 如果匝道在主路左侧 → normal_direction = "toward_bottom"（与左侧主路相同）。
        - 如果匝道在主路右侧 → normal_direction = "toward_top"（与右侧主路相同）。
        - direction_confidence = 0.9
        - direction_reasoning = "匝道与所在主路同向"

      规则 3 — 单条主路或单条匝道（无可见中央隔离带）：
      - 仅当场景显示单条道路或匝道，且无明确双向分隔时：
        - 观察车辆大小：离摄像头越近的车辆看起来越大。
        - 如果车辆向画面下方移动时变大 → 车辆正在靠近（toward_bottom）。
        - 如果车辆向画面上方移动时变大 → 车辆正在靠近（toward_top）。
        - 使用此大小变化线索确定 normal_direction。
        - direction_confidence = 0.6-0.8
        - direction_reasoning = "单车道/单匝道，基于语义和透视判断"

      摄像头视角参考：
      - 画面上方 = 远离摄像头（远处，车辆看起来小）。
      - 画面下方 = 靠近摄像头（近处，车辆看起来大）。
      - toward_bottom = 从上向下移动 = 靠近摄像头（逐渐变大）。
      - toward_top = 从下向上移动 = 远离摄像头（逐渐变小）。

      =============================================================================
      应急车道识别规则
      =============================================================================

      对每条道路，你必须判断是否存在应急车道以及位于哪一侧。使用以下规则：

      规则 A — 相对于车流方向的位置：
      - 应急车道始终位于每条道路的外侧边缘（离中央隔离带/中央分隔带最远的一侧）。
      - 对于车流方向为 toward_bottom（从远到近，上→下）的道路：应急车道位于该道路的左侧（画面左侧）。
      - 对于车流方向为 toward_top（从近到远，下→上）的道路：应急车道位于该道路的右侧（画面右侧）。
      - 示例：在典型的双向高速公路上，左侧道路（来向）的应急车道在最左侧，右侧道路（去向）的应急车道在最右侧。

      规则 B — 视觉特征（注意以下所有特征）：
      - 与相邻主车道之间由白色实线分隔。重要：实线并不自动意味着应急车道——普通车道边界也可以是实线。
      - 位于道路最外侧边缘，在最后一条主行车道之外。
      - 可能有隆声带、凸起路面标线或"应急车道"标志。
      - 出入匝道的有白色或黄色网状实线的导流区属于应急车道。
      - 通常应急车道都是紧挨着护栏的。

      规则 C — 什么不是应急车道：
      - 两条主行车道之间的白色实线是车道边界，不是应急车道边界。
      - 由锥桶标记的临时车道偏移或车道封闭不构成应急车道。
      - 收费站或服务区的宽路肩不是应急车道。

      规则 D — 报告要求：
      - 如果不确定某条车道是否为应急车道，设置 has_emergency_lane=false 且 emergency_lane_side="none"。
      - 仅在看到规则 B 中至少两项视觉特征时，才报告 has_emergency_lane=true。

      重要 — scene_description 要求：
      在 "scene_description" 字段中，你必须对每个指标使用以下精确结构化格式。此格式支持自动解析——请勿偏离。

      使用模式 `{类别：状态/描述}`，其中 "无" 表示不存在，任何其他文本表示存在并附详情。

      必需标签（必须全部按此顺序出现在 scene_description 中）：
      0. {概括性描述输入视频看到的交通场景，包括应急车道上是否有车辆行驶；是否有异常停止的车辆等。}
      1. `{车流方向：描述}` — 对每条道路，使用相对于摄像头的术语明确指出正常流向（例如 "左侧道路从画面底部向顶部行驶（从近到远），右侧道路从画面顶部向底部行驶（从远到近）"）。务必同时包含相对于画面的方向（从画面X向Y）和深度提示（从近到远/从远到近）。
      2. `{行人：无}` 或 `{行人：有，具体描述}` — 无行人时写 "无"；否则描述所见内容。
      3. `{应急车道位置：描述}` — 必填。对每条道路，明确指出应急车道的位置。注意：路面颜色/纹理不同、白色实线标线、较窄车道宽度、外侧边缘路肩。示例："道路0应急车道在画面右侧，道路1应急车道在画面左侧" 或 "只有道路0有应急车道，在画面右侧"。如果看不到应急车道，写 "无"。
      4. `{应急车道车辆：无}` 或 `{应急车道车辆：有，具体描述}` — 按照{应急车道位置：描述}仔细检查。仅当应急车道/路肩完全空无一车时才写 "无"。否则描述路肩上的任何车辆，包括静止、停放、慢速移动或正在行驶的车辆。应急车道中的任何车辆均计入，无论其是否在移动。
      5. `{静止车辆：无}` 或 `{静止车辆：有，具体描述}` — 描述你看到的每一辆静止或停放的车辆（例如，"有，左侧车道黑色SUV静止，白色轿车停在应急车道，施工区域内有车辆静止"）。仅当所有车辆都在运动时才写 "无"。包括画面中看起来小的车辆（远离摄像头）以及被锥桶包围起来的封闭区域，尤其是锥桶包围区域通常有静止车辆；
      6. `{工程车：无}` 或 `{工程车：有，具体描述}` — 无施工时写 "无"；否则描述存在的设备/车辆/工人。
      7. `{非机动车：无}` 或 `{非机动车：有，具体描述}` — 无摩托车/自行车时写 "无"；否则描述。
      8. `{交通事故：无}` 或 `{交通事故：有，具体描述}` — 无事故时写 "无"；否则描述碰撞、翻车、有警车、拖车等。务必保守——仅在确信时才使用 "有"。
      9. `{路锥：无}` 或 `{路锥：有N个，在位置描述}` — 无交通锥时写 "无"；否则说明大致数量和位置（例如，"有12个，在左侧道路应急车道旁形成作业区"）。即使部分遮挡也计入可见锥桶。

      关键规则：
      - 花括号内的标签名称必须与上述完全一致。
      - 如果事件不存在，冒号后必须写 "无"。不要写 "未发现" 或留空。
      - 如果事件存在，写 "有，" 后跟简要客观描述。
      - 所有文本必须使用中文书写。
      - 有效的 scene_description 示例：
        "{车流方向：左侧道路从画面顶部向底部行驶（从远到近），右侧道路从画面底部向顶部行驶（从近到远）} {行人：无} {应急车道位置：道路0（左侧来向车道）应急车道在画面左侧，道路1（右侧去向车道）应急车道在画面右侧} {应急车道车辆：无} {静止车辆：无} {工程车：无} {非机动车：无} {交通事故：无} {路锥：无}"
    output_format_hint: "JSON"

  # ---------------------------------------------------------------------------
  # Direction Analysis (multi-step comprehensive direction determination)
  # Purpose: Dedicated 6-step analysis to reliably determine traffic flow
  #          direction per road. Uses professional traffic analysis methodology.
  #          STRICT REQUIREMENT: ALL 6 steps must be executed, no skipping.
  # ---------------------------------------------------------------------------
  - template_id: "road_direction_analysis"
    name: "道路方向分析"
    system_prompt: |
      你正在分析高速公路交通流向方向。观察多辆车的运动，确定每条道路/车道组的正常行驶方向。
    user_prompt: |
      分析这些视频帧，确定每条道路/车道组的正常行驶方向。

      已识别道路数量：{{ road_count }}

      关键说明：
      - 每张图片左上角都有标注，显示帧编号和时间戳（例如 "FRAME 1/8 t=0.00s [OLDEST]"）。图片按从旧到新的时间顺序提供。
      - 对每条道路，观察多辆车在跨帧之间的运动模式。比较同一辆车在较早帧（帧号较小、时间戳较小）和较晚帧（帧号较大、时间戳较大）中的位置。
      - 正常方向是大多数车辆正在移动的方向。
      - 不要使用车辆头部朝向来判断；仅使用跨帧位置变化。

      返回 JSON：
      {
        "roads": [
          {
            "road_id": <整数>,
            "normal_direction": "<toward_top|toward_bottom|toward_left|toward_right>",
            "confidence": <0.0-1.0>,
            "reasoning": "<基于观察到的车辆运动的简要说明>"
          }
        ]
      }

      重要提示：
      - 方向是相对于视频画面视觉定义的（不要使用坐标）：
        - "toward_top"    = 车辆向画面顶部边缘移动
        - "toward_bottom" = 车辆向画面底部边缘移动
        - "toward_left"   = 车辆向画面左侧边缘移动
        - "toward_right"  = 车辆向画面右侧边缘移动
      - 判断方向：选取一辆车，记录它在较早帧中的位置，然后记录它在较晚帧中的位置。如果它向顶部移动，使用 "toward_top"。
      - 观察多辆车，不要只看一辆
      - 在双向高速公路上，相对道路应有相反方向
      - 如果方向不清楚，以较低置信度说明

  # ---------------------------------------------------------------------------
  # Direct Reversing Detection
  # Purpose: One-shot detection of reversing/wrong-way vehicles.
  # Why: Fewer VLM calls = fewer parse errors. Direct comparison of first/last frame
  #      catches slow reversing that "suspicious behavior" prompts miss.
  # ---------------------------------------------------------------------------
  - template_id: "direct_reversing_detection"
    name: "直接逆行/倒车检测"
    system_prompt: |
      你是一名交通监控分析师。你的任务是检测正在倒车或逆行的车辆。
      关键：仔细比较第一帧和最后一帧。有些车辆可能看起来静止，但实际上已经朝反方向轻微移动。
    user_prompt: |
      上面提供的图片就是你必须分析的视频帧。你可以看到它们——不要声称无法查看图片。将你的全部分析基于这些帧。

      检查来自高速公路监控摄像头的这些视频帧。

      场景信息：
      - 道路数量：{{ road_count }}
      - 已知正常流向（由场景理解预先确定——直接使用，不要重新验证）：
      {% for road in road_directions %}
        道路 {{ road.road_id }}: {{ road.normal_direction }}
      {% endfor %}
      - 整体交通状况分析的先验知识：
      {% if scene_description %}
        {{ scene_description }}
      {% else %}
        （无先验场景描述可用。）
      {% endif %}

      关键先验知识：
      上述"先验知识"来自之前的全面场景分析。它提供了一个车辆列表，这些车辆**可能**是逆行/倒车行为的候选。但是，你**不得**直接采信先验知识——你的任务是通过帧对比独立验证：
      1. 先验知识识别候选车辆（例如：应急车道上的车辆、静止车辆、工程车辆）。将其作为起点，而非结论。
      2. 即使先验知识将某辆车描述为"stopped"、"静止"或"正在作业"，你**仍然**必须检查该车是否在倒车或逆行。车辆在倒车过程中可能暂时处于静止状态。
      3. 不要仅因先验知识说某辆车静止或正在进行维护就得出"无逆行"的结论。静止**不等于**"未逆行"——该车可能刚完成倒车，或正在倒车过程中。
      4. 你**必须**对先验知识中提到的每一辆位于应急车道、路肩或静止的车辆执行逐帧对比。不要跳过任何候选。
      5. 关键规则 — 物理检测优先，但须排除施工区域：
         - 你的任务是检测车辆的车身移动方向是否与已知正常流向相反。
         - **施工区域内车辆往返作业不算逆行/倒车** — 如果车辆位于有锥桶、施工标志牌和施工人员组成的施工区域内，即使其移动方向与正常流向相反，也**不判定**为逆行/倒车。
         - 不要对行为做"合法/非法"的价值判断，只记录物理运动。
         - 下游系统会判断是否为违规。

      检测步骤：
      1. 仔细阅读"先验知识"，识别哪些车辆位于应急车道、路肩或静止/违停。
      2. 对每辆候选车辆执行以下7步检查，并将每步结果写入 reasoning：
         a. **选帧对比**：选择该车最早可见帧和最晚可见帧，记录帧号和时间戳。
         b. **像素位移估计**：
            - 选取可识别的特征点（前保险杠中心、显著标记或几何中心）。
            - 估算该点在早帧和晚帧中的坐标，以**画面宽高的百分比**表示（0-100%）。
            - 计算位移：Δx = x_晚 - x_早，Δy = y_晚 - y_早，单位为**百分点**。同时估算车辆宽高占画面百分比。
            - 显著性判断：|Δx|或|Δy|超过3%画面尺寸，或位移幅值√(Δx²+Δy²)超过2%画面对角线 → "significant"，否则"negligible"。
            - 记录：pixel_displacement_estimate = {"delta_x_pct": float, "delta_y_pct": float, "magnitude_pct": float, "vehicle_width_pct": float, "vehicle_height_pct": float, "significance": "significant|negligible"}
            - **即使位移数值很小（2-5%），只要在多帧中方向一致，也必须报告为"significant"。**
         c. **固定参照物位置变化**：描述车辆相对于护栏、标线、隔离带、交通锥、标志牌等固定物体的位置变化（如"画面左侧偏上"→"画面中央偏右"）。
         d. **车头朝向**：车头指向（toward_top/toward_bottom/toward_left/toward_right）。
         e. **车身实际移动方向**：基于位置变化判断（toward_top/toward_bottom/toward_left/toward_right）。
         f. **与已知正常流向对比**：车身移动方向是否与此道路已知正常流向相反？如是，则为逆行/倒车。
         g. **车头与车身一致性**：车头朝向与车身移动方向相反 → REVERSING（倒车）；车头与车身同向但都与正常流向相反 → WRONG-WAY（逆行）。

      3. 特别注意路肩上的白色/浅色车辆 — 它们是最常见的倒车候选。
      4. **仅在以下情况报告 detected=false**：
         - 先验知识中未提及应急车道/路肩/静止车辆；或
         - 对每辆候选车辆逐帧对比后，确认**没有任何车辆**的移动方向与正常流向相反；且
         - 候选车辆**不在施工区域内**。
         - **不要因为先验知识说车辆"静止"或"正在作业"就报告 false，必须通过实际帧对比验证。**

      输出格式 — JSON（无markdown，无额外文本）：
      {
        "vehicles": [
          {
            "vehicle_id": "vehicle_1",
            "road_id": 0,
            "behavior": "reversing",
            "start_time_sec": 0.0,
            "end_time_sec": 22.0,
            "confidence": 0.9,
            "description": "白色轿车在应急车道倒车",
            "reasoning": "通过对比第1帧(0.0s)和第8帧(7.0s)，黄色抢险车相对于左侧护栏和交通锥的位置明显向画面下方移动...",
            "pixel_displacement_estimate": {
              "delta_x_pct": -2.5,
              "delta_y_pct": 8.0,
              "magnitude_pct": 8.4,
              "vehicle_width_pct": 15.0,
              "vehicle_height_pct": 10.0,
              "significance": "significant"
            }
          }
        ],
        "detected": true,
        "confidence": 0.9,
        "reasoning": "检测到1辆逆行车辆：右侧应急车道上的黄色抢险车..."
      }

      如果未检测到逆行/倒车车辆，返回：
      {
        "vehicles": [],
        "detected": false,
        "confidence": 0.0,
        "reasoning": "详细说明检查了哪些车辆、对比了哪些帧、为什么判断没有逆行/倒车。例如：检查了右侧应急车道的工程车，对比第1帧和第8帧，该车位于施工区域（有锥桶和施工人员），根据规则不计入逆行；同时该车相对于交通锥的位置向画面下方移动，与正常车流方向一致。"
      }

      重要：
      - "description"、"reasoning" 字段必须使用中文。
      - "reasoning" 必须包含具体帧号/时间戳、参照物、完整推理链（位置变化→车头朝向→车身移动→与正常流向对比→施工区域排除）。
      - 即使 detected=false，也必须写出详细的分析过程。

      保持保守。仅在帧对比后有信心时才报告。

      关键 — 像素位移是主要证据：
      - "significant" 分类覆盖任何主观"没动"的印象。
      - 当像素位移说 significant 但视觉印象说没动时，**相信像素位移**。
      - 在 reasoning 中明确写出像素数值。

  # ---------------------------------------------------------------------------
  # Vehicle Movement Tracking (precision frames)
  # ---------------------------------------------------------------------------
  - template_id: "direct_event_detection"
    name: "直接事件检测"
    system_prompt: |
      你是一名专业的高速公路交通监控分析师。检查提供的视频帧并检测特定的交通事件。
    user_prompt: |
      待检测事件：{{ event_name }}
      定义：{{ event_definition }}
      需关注的视觉指标：
      {% for indicator in visual_indicators %}
      - {{ indicator }}
      {% endfor %}

      {% if event_name == "违法停车" %}
      特别注意：
      - 施工区域内的车辆停车**也需要标注**为违法停车（施工区域内车辆停车施工是违法停车的一种特殊情况）。
      - 不要因为车辆位于施工区域就排除其违法停车的判定。
      - 静止持续时间无需在视频中完整体现，视频中只要能看到车辆处于静止/停放状态即可判定。
      {% endif %}

      仔细检查这些视频帧，判断该事件是否存在。

      返回 JSON：
      {
        "detected": <true|false>,
        "instances": [
          {
            "start_time_sec": <大致开始时间>,
            "end_time_sec": <大致结束时间>,
            "confidence": <0.0-1.0>,
            "evidence_frames": [<帧索引>],
            "description": "<观察到的内容>",
            "reasoning": "<为什么认为这是该事件>"
          }
        ],
        "summary": "<总体评估>",
        "confidence": <0.0-1.0>
      }

      如果事件中**不存在**该事件，返回：
      {
        "detected": false,
        "instances": [],
        "summary": "视频中未检测到 {{ event_name }}。",
        "confidence": 0.0
      }

      重要提示：所有文本字段 "description"、"reasoning" 和 "summary" 必须使用中文书写。

      保持保守 - 仅报告你有合理信心确认的内容。

  # ---------------------------------------------------------------------------
  # Road Construction Detection
  # Purpose: Dedicated template for road construction / maintenance work zones.
  # Why: Generic template misses the nuance between actual construction
  #      (workers + cones + equipment) vs routine cleaning (sweeper truck only).
  # ---------------------------------------------------------------------------
  - template_id: "road_construction_detection"
    name: "道路施工检测"
    system_prompt: |
      你是一名交通监控分析师。检测活跃的道路施工或维护作业区。
    user_prompt: |
      检测这些视频帧中的道路施工/维护作业区。

      定义 — 以下任一情况均认定为道路施工：
      (A) **可见的交通锥或隔离栏布置**（形成作业区、车道封闭或交通引导区域），并且**至少满足以下一项**：
          - 穿着高可视性服装的工人（橙色、黄色或荧光绿色背心/帽子）
          - 工程/施工车辆或设备（沥青摊铺机、压路机、水泥搅拌车、挖掘机、自卸卡车、起重机等）
          - 由锥桶/隔离栏布置明确指示的车道封闭或交通引导（区域封闭，引导）
      (B) 在路面上作业的施工设备（即使没有锥桶，例如夜间铺设仅靠车载箭头板指示）。
      

      重要 — 以下情况**不属于**道路施工：
      - 单一清扫车或清洁车辆执行日常道路清洁
      - 应急救援或故障处理车辆（警车、救护车、拖车）——这些**不是**施工。
      

      操作指引：
      1. 用于引导交通、封闭车道或标记作业区的锥桶/隔离栏均视为施工 报告 detected=true（有明确施工范围划分）。即使只有3-5个锥桶形成清晰图案（直线、曲线或区域边界）也足够。
      2. 如果锥桶+工人存在但无重型设备，报告 detected=true（人工道路作业或标线作业）。
      3. 如果锥桶+工程车辆存在但无可见工人，报告 detected=true（机械化作业，工人可能在车内或画面外）。
      4. 如果**只有**工程车辆可见，无锥桶/隔离栏且无工人，报告 detected=false。
      5. 记录大致位置（哪条车道、路肩或全封闭）。

      返回 JSON：
      {
        "detected": <true|false>,
        "instances": [
          {
            "start_time_sec": <大致开始时间>,
            "end_time_sec": <大致结束时间>,
            "confidence": <0.0-1.0>,
            "evidence_frames": [<帧索引>],
            "description": "<观察到的内容：工人、设备、锥桶布置>",
            "reasoning": "<为什么属于或不属于施工：列出看到的和缺失的>"
          }
        ],
        "summary": "<总体评估>",
        "confidence": <0.0-1.0>
      }

      如果事件中**不存在**施工，返回：
      {
        "detected": false,
        "instances": [],
        "summary": "未检测到道路施工。说明看到了什么（如：只有一辆清扫车，无工人，无锥桶；或：有工程车但无锥桶隔离系统）。解释为什么认为不是施工（如没有用锥桶封闭区域；）",
        "confidence": 0.0
      }

      重要：
      - 所有文本字段 "description"、"reasoning" 和 "summary" 必须使用中文书写。
      - 务必保守。如果不确定是施工还是日常清洁，报告 detected=false 并说明原因。

  # ---------------------------------------------------------------------------
  # Emergency Lane Occupancy Detection
  # Purpose: Dedicated direct VLM detection for emergency lane occupancy.
  # Why: scene_tag mode relies on a single tag in scene_understanding which
  #      easily misses vehicles in the emergency lane. A dedicated VLM call
  #      focuses attention specifically on emergency lane areas.
  # ---------------------------------------------------------------------------
  - template_id: "emergency_lane_occupancy_detection"
    name: "应急车道占用检测"
    system_prompt: |
      你是一名交通监控分析师。你的唯一任务是检测应急车道上的车辆占用情况。
    user_prompt: |
      检测这些视频帧中的应急车道占用情况。

      {% if scene_understanding %}
      已知场景信息（来自场景理解分析）：
      - 道路数量：{{ scene_understanding.road_count }}
      - 各道路信息：
      {% for road in scene_understanding.roads %}
        道路 {{ road.road_id }}: {{ road.name }}，应急车道: {% if road.has_emergency_lane %}有，位于 {{ road.emergency_lane_side }} 侧{% else %}无{% endif %}
      {% endfor %}
      - 场景描述：{{ scene_understanding.scene_description }}
      {% endif %}

      定义 — 应急车道占用：
      应急车道（路肩）是高速公路最外侧的专用车道，通常用于紧急停车。以下情况均属于应急车道占用：
      - 任何车辆在应急车道上行驶（无论速度多慢）
      - 任何车辆在应急车道上停止或停放
      - 任何车辆部分或完全进入应急车道区域
      - 匝道出入口处的白色/黄色网状实线导流区也属于应急车道范围，该区域内的车辆同样计入应急车道占用

      重要 — 以下情况**不属于**应急车道占用（必须排除）：
      - **施工区域内的车辆**：如果车辆位于有锥桶、施工标志牌、施工人员组成的施工区域内，即使该车辆在应急车道上，也**不判定**为应急车道占用。施工区域内的工程车、养护车等 authorized vehicles 在应急车道上**不算占用**。
      - **交通事故现场**：交通事故涉及的占用应急车道，无需标注。

      检查步骤：
      1. 首先根据已知场景信息确定应急车道位置（如果没有已知信息，则从画面中自行判断）。
      2. 逐帧仔细检查应急车道区域，特别注意：
         - 画面边缘区域（应急车道通常在画面最左或最右侧）
         - 应急车道通常紧挨护栏
         - 即使车辆看起来很小（远距离）也要检查
         - 即使车辆只是部分压线进入应急车道也要报告
        
      3. 对发现的每一辆应急车道上的车辆，描述：
         - 车辆类型、颜色
         - 在应急车道上的行为（行驶/停止/停放/部分进入）
         - 所在位置（哪条道路的应急车道）

      返回 JSON：
      {
        "detected": <true|false>,
        "instances": [
          {
            "start_time_sec": <大致开始时间>,
            "end_time_sec": <大致结束时间>,
            "confidence": <0.0-1.0>,
            "evidence_frames": [<帧索引>],
            "description": "<观察到的内容：车辆类型、颜色、在应急车道上的行为>",
            "reasoning": "<为什么判断为应急车道占用：车辆位置、行为描述>"
          }
        ],
        "summary": "<总体评估>",
        "confidence": <0.0-1.0>
      }

      如果未检测到应急车道占用，返回：
      {
        "detected": false,
        "instances": [],
        "summary": "未检测到应急车道占用。已仔细检查应急车道区域，未发现任何车辆。",
        "confidence": 0.0
      }

      重要：
      - 所有文本字段 "description"、"reasoning" 和 "summary" 必须使用中文书写。
      - 即使只有一辆车部分进入应急车道，也必须报告 detected=true。
      - 如果应急车道上有车辆但你不确定它是否在应急车道内，宁可报告 detected=true 也不要遗漏。

  # ---------------------------------------------------------------------------
  # Emergency Lane Location
  # ---------------------------------------------------------------------------
  - template_id: "emergency_lane_location"
    name: "应急车道位置识别"
    system_prompt: |
      识别高速公路监控视频中的应急车道。
    user_prompt: |
      查看这些视频帧，识别所有应急车道（也称为路肩或紧急停车带）。

      应急车道特征：
      - 位于道路最左侧或最右侧边缘
      - 通常路面颜色或纹理不同
      - 以白色实线、斜纹标线或较粗的边界线标记
      - 通常比标准车道窄
      - 可能有"应急车道"或"禁止停车"标志

      仅返回以下精确格式的 JSON 对象（不要 markdown，不要额外文本）：
      {
        "emergency_lanes": [
          {
            "lane_id": <整数>,
            "side": "<left|right>",
            "bbox": [<x1, y1, x2, y2>],
            "confidence": <0.0-1.0>
          }
        ],
        "confidence": <0.0-1.0>
      }

  # ---------------------------------------------------------------------------
  # Emergency Lane Vehicle Tracking
  # ---------------------------------------------------------------------------
  - template_id: "emergency_lane_vehicle_tracking"
    name: "应急车道车辆追踪"
    system_prompt: |
      追踪进入或占用应急车道的车辆。
    user_prompt: |
      已知应急车道区域：
      {{ emergency_lane_regions | tojson }}

      检查这些视频帧，识别所有符合以下条件的车辆：
      1. 进入应急车道
      2. 在应急车道上停止或停放
      3. 在应急车道上行驶

      仅返回以下精确格式的 JSON 对象（不要 markdown，不要额外文本）：
      {
        "vehicles": [
          {
            "vehicle_id": "<id>",
            "lane_id": <整数>,
            "behavior": "<entering|stopping|traveling|parking>",
            "start_time_sec": <浮点数>,
            "end_time_sec": <浮点数>,
            "confidence": <0.0-1.0>
          }
        ]
      }

  # ---------------------------------------------------------------------------
  # Lane Marking Identification
  # ---------------------------------------------------------------------------
  - template_id: "lane_marking_identification"
    name: "车道标线识别"
    system_prompt: |
      识别并分类高速公路视频中的车道标线。
    user_prompt: |
      检查这些视频帧，识别所有车道标线。
      将每条标线分类为"实线"或"虚线/断续线"。

      实线表示禁止变道区域。
      虚线/断续线表示允许变道区域。

      仅返回以下精确格式的 JSON 对象（不要 markdown，不要额外文本）：
      {
        "lane_markings": [
          {
            "line_id": <整数>,
            "type": "<solid|dashed>",
            "bbox": [<x1, y1, x2, y2>],
            "confidence": <0.0-1.0>
          }
        ]
      }

      如果看不到车道标线，返回：{"lane_markings": []}

  # ---------------------------------------------------------------------------
  # Lane Change Tracking
  # ---------------------------------------------------------------------------
  - template_id: "lane_change_tracking"
    name: "变道追踪"
    system_prompt: |
      追踪跨帧的车辆变道行为。
    user_prompt: |
      已知车道标线：
      {{ lane_markings | tojson }}

      检查这些精确帧，追踪执行变道操作的车辆。
      对每个变道操作，记录：
      - 车辆标识
      - 起始车道和目标车道
      - 车辆跨越车道线的位置
      - 时间戳

      仅返回以下精确格式的 JSON 对象（不要 markdown，不要额外文本）：
      {
        "lane_changes": [
          {
            "vehicle_id": "<id>",
            "from_lane": <整数>,
            "to_lane": <整数>,
            "cross_position": [<x, y>],
            "time_sec": <浮点数>,
            "confidence": <0.0-1.0>
          }
        ]
      }

      如果未检测到变道，返回：{"lane_changes": []}

  # ---------------------------------------------------------------------------
  # Illegal Parking Detection
  # Purpose: Dedicated direct VLM detection for illegal parking events.
  # Why: The generic direct_event_detection template lacks the nuanced rules
  #      for illegal parking (e.g., non-motor vehicle exclusion, construction
  #      zone handling, accident deduplication, emergency lane co-detection).
  # ---------------------------------------------------------------------------
  - template_id: "illegal_parking_detection"
    name: "Illegal Parking Detection"
    system_prompt: |
      你是一名专业的高速公路交通监控分析师。你的任务是检测视频中的违法停车事件。
    user_prompt: |
      检测这些视频帧中的违法停车事件。

      定义 — 违法停车：
      违法停车是指机动车在禁止停车的区域处于静止或停放状态的行为。以下情况均属于违法停车：
      - 车辆在行车道（主车道）上静止或停放
      - 车辆在应急车道上静止或停放
      - 车辆在导流区（匝道出入口处的白色/黄色网状实线区域）内静止或停放
      - 车辆在路肩区域静止或停放
      - 施工区域内的车辆停车施工（施工区域内车辆停车施工是违法停车的一种特殊情况，必须标注）
      - 警车、工程车、抢险救援车等特种车辆静止或停放（只要不在执行紧急任务，均属于违法停车）
      - 车辆在路肩，路边，压路边实线停车也要标注违法停车

      重要 — 以下情况必须排除（不判定为违法停车）：
      - **非机动车**：摩托车、电动自行车、自行车等非机动车静止时，**不判定**为违法停车。本事件只针对机动车。
      - **交通事故**：涉及交通事故的车辆静止，只需标注交通事故，**不重复标注**违法停车。交通事故是最高优先级事件。
      - **施工区域内 authorized 作业**：如果车辆位于有锥桶、施工标志牌、施工人员组成的施工区域内，且正在进行施工作业（如沥青摊铺机作业、压路机作业），此类 authorized 施工车辆**不算**违法停车。但施工区域内普通车辆随意停放**仍算**违法停车。
      - **正常等红灯或排队**：车辆在路口正常等待信号灯或在拥堵中缓慢移动，不属于违法停车。

      检查步骤：
      1. 逐帧扫描所有视频帧，识别画面中的每一辆机动车。
      2. 对每辆机动车判断其运动状态：
         - 如果车辆在多帧中位置基本不变（相对于路面标线、护栏等固定参照物），判定为静止/停放状态。
         - 静止持续时间**无需**在视频中完整体现，视频中只要能看到车辆处于静止/停放状态即可判定。
      3. 确认静止车辆所在区域：
         - 行车道（主车道，包括快车道、慢车道）
         - 应急车道（路肩，最外侧车道）
         - 导流区（匝道出入口的网状实线区域）
         - 路肩（道路边缘区域）
      4. 排除非机动车：确认静止车辆是机动车（轿车、SUV、货车、客车、工程车等），而非摩托车、电动自行车、自行车。
      5. 排除交通事故：如果车辆静止是因为碰撞、翻车、起火等交通事故，不标注违法停车。
      6. 施工区域特殊处理：施工区域内的车辆停车需标注为违法停车，不要因车辆位于施工区域就排除。
      7. 应急车道上的车辆静止时，需同时判定违法停车和应急车道占用（两个事件均触发）。

      返回 JSON：
      {
        "detected": <true|false>,
        "instances": [
          {
            "start_time_sec": <大致开始时间（秒）>,
            "end_time_sec": <大致结束时间（秒）>,
            "confidence": <0.0-1.0>,
            "evidence_frames": [<帧索引>],
            "description": "<观察到的内容：车辆类型、颜色、停放位置、状态描述>",
            "reasoning": "<为什么判定为违法停车：车辆类型确认、静止状态判断、所在区域、排除规则检查结果>"
          }
        ],
        "summary": "<总体评估：共检测到几辆违法停车车辆，分别位于什么位置，有无特殊情况>",
        "confidence": <0.0-1.0>
      }

      如果未检测到违法停车，返回：
      {
        "detected": false,
        "instances": [],
        "summary": "未检测到违法停车。已逐帧检查所有车辆，所有车辆均在正常行驶，或静止车辆为非机动车/交通事故/正常等红灯。",
        "confidence": 0.0
      }

      重要：
      - 所有文本字段 "description"、"reasoning" 和 "summary" 必须使用中文书写。
      - 务必保守。如果无法确定车辆是否静止（例如车辆距离太远、画面模糊），宁可不报告也不要误报。
      - 静止判断以相对于路面固定参照物（标线、护栏、交通锥）的位置变化为准。
      - 即使车辆看起来很小（远距离）也要检查。
    output_format_hint: "JSON"


  # ---------------------------------------------------------------------------
  # Traffic Accident Detection
  # Purpose: Dedicated direct VLM detection for traffic accidents.
  # Why: scene_tag mode relies on a single tag in scene_understanding which
  #      easily misses accidents. A dedicated VLM call focuses attention
  #      specifically on accident indicators. Also serves as a backup when
  #      scene_tag mode produces false negatives.
  # ---------------------------------------------------------------------------
  - template_id: "traffic_accident_detection"
    name: "交通事故检测"
    system_prompt: |
      你是一名专业的高速公路交通监控分析师。你的任务是检测视频中的交通事故事件。
    user_prompt: |
      检测这些视频帧中的交通事故事件。

      定义 — 交通事故：
      交通事故是指在高速公路上发生的涉及车辆损坏、人员伤亡或道路障碍的突发事件。以下情况均属于交通事故：
      - **车辆碰撞**：追尾、侧面碰撞、多车连环相撞、刮擦等
      - **车辆故障抛锚**：车辆因机械故障停在车道上无法移动（注意与正常违法停车的区分：故障车通常有警示标志、双闪灯、或明显损坏迹象）
      - **道路散落物/障碍物**：因事故产生的车辆碎片、货物散落等阻塞车道
      - **车辆翻车/侧翻**：车辆翻倒、侧翻、仰翻
      - **车辆起火/冒烟**：车辆燃烧、冒烟、有明火
      - **动物进入车道**：动物在高速公路上导致交通险情

      重要 — 以下情况必须排除（不判定为交通事故）：
      - **道路施工**：有锥桶、施工人员、工程车辆的正常施工作业区域不属于交通事故。
      - **正常故障车**：车辆因故障停在应急车道上并开启双闪、放置三角警示牌，属于正常应急停车，不判定为交通事故（但可能触发违法停车/应急车道占用）。
      - **已处理完毕的事故现场**：只有清理车辆无损坏车辆或碎片，不判定为当前交通事故。
      - **车辆倒车/逆行**：单独的车辆逆行/倒车事件，不归类为交通事故。

      交通事故优先级规则：
      - 交通事故是最高优先级事件。一旦判定为交通事故，涉及的违停、应急车道占用、行人等**不再重复标注**。
      - 注意与施工、正常故障车的区分。

      检查步骤：
      1. 逐帧扫描所有视频帧，寻找以下视觉特征：
         - 车辆明显损坏（变形、破碎、零件脱落）
         - 车辆异常姿态（侧翻、仰翻、横在车道上）
         - 烟雾或火焰
         - 路面散落物（碎片、货物、零件）
         - 多车聚集且姿态异常（碰撞后状态）
         - 警车、救护车、消防车、拖车等救援车辆到场（可能暗示事故发生）
      2. 对发现的每一个疑似事故，确认：
         - 是否真的是事故（排除施工、正常停车）
         - 事故类型（碰撞、翻车、起火、抛锚等）
         - 涉及车辆数量和类型
         - 是否阻塞车道
      3. 如果有救援车辆到场但看不到事故本身，谨慎判断——可能事故在画面外或已处理完毕。

      返回 JSON：
      {
        "detected": <true|false>,
        "instances": [
          {
            "start_time_sec": <大致开始时间（秒）>,
            "end_time_sec": <大致结束时间（秒）>,
            "confidence": <0.0-1.0>,
            "evidence_frames": [<帧索引>],
            "description": "<观察到的内容：事故类型、涉及车辆、损坏程度、位置>",
            "reasoning": "<为什么判定为交通事故：看到的视觉证据、排除其他可能性的理由>"
          }
        ],
        "summary": "<总体评估：事故严重程度、影响范围、涉及车辆数>",
        "confidence": <0.0-1.0>
      }

      如果未检测到交通事故，返回：
      {
        "detected": false,
        "instances": [],
        "summary": "未检测到交通事故。已逐帧检查所有视频帧，未发现车辆碰撞、翻车、起火、散落物等事故迹象。所有车辆正常行驶或停放。",
        "confidence": 0.0
      }

      重要：
      - 所有文本字段 "description"、"reasoning" 和 "summary" 必须使用中文书写。
      - 务必保守。仅在看到明确的损坏、烟雾、翻车、散落物等证据时才报告。
      - 救援车辆到场本身不是事故证据，需结合其他视觉线索判断。
      - 注意区分事故散落物和正常道路垃圾/抛洒物。
    output_format_hint: "JSON"

  # ---------------------------------------------------------------------------
  # Pedestrian Detection
  # Purpose: Dedicated direct VLM detection for pedestrians on highways.
  # Why: scene_tag mode relies on a single boolean field which easily misses
  #      pedestrians. A dedicated VLM call focuses attention specifically on
  #      human figures in restricted highway areas. Also serves as a backup
  #      when scene_tag mode produces false negatives.
  # ---------------------------------------------------------------------------
  - template_id: "pedestrian_detection"
    name: "Pedestrian Detection"
    system_prompt: |
      你是一名专业的高速公路交通监控分析师。你的任务是检测视频中高速公路上的行人。
    user_prompt: |
      检测这些视频帧中高速公路上的行人。

      定义 — 高速公路行人出现：
      高速公路是禁止行人进入的封闭交通区域。以下情况均属于高速公路行人出现事件：
      - **行人**：在高速公路车道、路肩、中央隔离带、匝道等区域行走的普通人
      - **滞留驾乘人员**：因车辆故障或事故而下车，在道路上或路肩行走的驾乘人员
      - **穿越高速公路者**：试图横穿高速公路车道的人员
      - **道路养护人员**：穿着反光背心的道路养护工人在没有锥桶、施工标志牌、工程车辆组成的施工区域内行走或作业，判定为行人事件。

      重要 — 以下情况必须排除（不判定为行人事件）：
      - **施工人员在施工区域内**：穿着高可视性服装（橙色、黄色、荧光绿色背心/帽子）的施工人员在有锥桶、施工标志牌、工程车辆组成的施工区域内行走或作业，**不判定**为行人事件。这是 authorized 的道路施工活动。
      - **道路养护人员**：穿着反光背心的道路养护工人在有锥桶、施工标志牌、工程车辆组成的施工区域内行走或作业，不判定为行人事件。
      - **交通警察在执行公务**：交警在指挥交通或处理事故时，不判定为行人事件。
      - **救援人员在事故现场**：消防员、医护人员、救援人员在事故现场作业，不判定为行人事件。
      - **非人类物体**： roadside signs（路侧标志牌）、bridge shadows（桥梁阴影）、overpasses（天桥/立交桥）、vegetation（植被）、护栏反光片等常见的误报源，必须排除。
      - **若发生事故**：在警车旁或圆锥桶内的行人，不判定为行人事件。
      
      常见误报源识别：
      - **路侧标志牌**：固定不动的矩形物体，通常有文字或图案
      - **桥梁阴影**：横跨画面的深色阴影带，随时间缓慢移动
      - **植被/树木**：在画面边缘摇摆的植物，通常有绿色或棕色
      - **中央隔离带护栏反光片**：规则排列的小型反光点
      - **动物**：四足行走的动物不属于行人事件（但可能触发交通事故）

      检查步骤：
      1. 逐帧扫描所有视频帧，寻找人形轮廓。
      2. 对发现的每一个人形轮廓，确认：
         - 是否真的是人类（排除标志牌、阴影、植被等误报源）
         - 是否在高速公路区域（车道、路肩、中央隔离带、匝道）内
         - 是否穿着施工服装（橙色/黄色/荧光绿背心）且位于施工区域内
         - 是否在进行 authorized 作业活动
      3. 描述行人的位置、行为、穿着特征。
      4. 即使行人看起来很小（远距离）也要检查。
      5. 即使行人部分被遮挡也要尽可能报告。

      返回 JSON：
      {
        "detected": <true|false>,
        "instances": [
          {
            "start_time_sec": <大致开始时间（秒）>,
            "end_time_sec": <大致结束时间（秒）>,
            "confidence": <0.0-1.0>,
            "evidence_frames": [<帧索引>],
            "description": "<观察到的内容：行人位置、行为、穿着、人数>",
            "reasoning": "<为什么判定为行人：人形特征确认、位置描述、排除施工/误报源的理由>"
          }
        ],
        "summary": "<总体评估：共发现多少行人，分布在什么位置，有无危险行为>",
        "confidence": <0.0-1.0>
      }

      如果未检测到行人，返回：
      {
        "detected": false,
        "instances": [],
        "summary": "未检测到高速公路行人。已逐帧检查所有视频帧，未发现人形目标。所有疑似目标经排查确认为标志牌、阴影、植被等误报源，或位于施工区域内的 authorized 作业人员。",
        "confidence": 0.0
      }

      重要：
      - 所有文本字段 "description"、"reasoning" 和 "summary" 必须使用中文书写。
      - 务必保守。如果无法确定是否为人形（例如距离太远、画面模糊），宁可不报告也不要误报。
      - 特别注意区分行人和施工人员：施工人员通常穿着高可视性服装且位于施工区域内。
      - 即使只有一个人也要报告 detected=true。
    output_format_hint: "JSON"


  # ---------------------------------------------------------------------------
  # Motorcycle Detection
  # Purpose: Dedicated direct VLM detection for motorcycles on highways.
  # Why: scene_tag mode relies on a single boolean field which easily misses
  #      motorcycles. A dedicated VLM call focuses attention specifically on
  #      two-wheeled motorized vehicles. Also serves as a backup when
  #      scene_tag mode produces false negatives.
  # ---------------------------------------------------------------------------
  # ---------------------------------------------------------------------------
  # Non-motor / Two-wheel Vehicle Detection
  # Purpose: Dedicated direct VLM detection for motorcycles, bicycles,
  #          electric bicycles, tricycles and other small two/three-wheel vehicles.
  # ---------------------------------------------------------------------------
  - template_id: "non_motor_vehicle_detection"
    name: "Non-motor Vehicle Detection"
    system_prompt: |
      你是一名专业的高速公路交通监控分析师。你的任务是检测视频中高速公路上的非机动车及小型两轮、三轮或低速骑行/代步车辆。
    user_prompt: |
      检测这些视频帧中高速公路上的非机动车及小型两轮、三轮或低速骑行/代步车辆。

      {% if scene_understanding %}
      已知场景信息（来自场景理解分析）：
      - 道路数量：{{ scene_understanding.road_count }}
      - 场景描述：{{ scene_understanding.scene_description }}
      {% endif %}

      定义 — 非机动车及两轮/三轮小型车辆出现：
      本模板用于检测高速公路上不属于常规汽车车流的小型两轮、三轮或低速骑行/代步车辆，包括摩托车。以下情况均属于本事件：
      - 摩托车，包括两轮摩托车、三轮摩托车、重型机车
      - 电动自行车 / 电瓶车
      - 自行车
      - 人力三轮车
      - 电动三轮车
      - 滑板车、平衡车等小型代步工具
      - 其他明显不属于轿车、SUV、货车、客车、工程车的两轮或三轮车辆
      - 远距离或画面边缘处的小型两轮/三轮目标，即使只清楚看到骑手轮廓、车灯、车把或窄小车身，也属于候选目标。
      - 视频开头或结尾短暂出现的两轮/三轮目标，只要具备车辆运动特征，也必须计入。
      - 上述车辆在高速公路车道、应急车道、路肩、匝道、中央隔离带附近或车流间隙中行驶、停放、穿行或短暂出现。

      重要 — 以下情况必须排除：
      - 普通机动车：轿车、SUV、货车、客车、工程车、清障车、警车、救护车等不属于本事件。
      - 行人：没有骑乘或驾驶车辆的人不属于本事件。
      - 施工设备：施工区域内的小型压路机、作业机械、养护设备不属于本事件。
      - 路侧标志牌、阴影、护栏反光片、杂物、锥桶等非车辆目标必须排除。
      - 车上装载的自行车、摩托车，如果没有独立在道路上行驶或停放，不属于本事件。
      - 夜间孤立亮点、护栏反光点、普通车辆远光灯或尾灯，不能仅凭亮点判定为两轮/三轮车辆，必须结合骑乘姿态、窄小车身、车把、头盔轮廓或连续运动轨迹判断。

      重要 — 以下情况要着重分析：
      - 不能因为目标位于画面左上角、上边缘、右上角、画面边缘、距离较远、只在开头几帧出现、车轮不完整可见，就判定为无。
      - 不能因为目标位于画面左下角、右下角、最后几帧才进入画面、只出现1–3帧，就判定为无。
      - 夜间小型两轮/三轮车辆可主要依据骑乘姿态、窄小车身、车灯和跨帧移动来识别，但不能仅凭单个亮点直接判定。
      - 远处小型两轮车常出现在画面上方、左上角、右上角、画面下方、左下角、右下角、中央隔离带附近、应急车道或道路边缘，必须重点检查。
      
      视觉特征：
      - 两轮或三轮结构、骑乘姿态、窄小车身、车把、单点/双点车灯、骑手头盔或骑手上半身轮廓，任意两项同时出现即可作为候选目标。
      - 夜间远距离目标不要求完整看清两个车轮；如果表现为单个或小型移动光源，需要结合骑乘姿态、窄小车身、与普通四轮车不同的细长轮廓或连续跨帧移动轨迹共同判断。
      - 可见骑乘者或驾驶者，通常呈骑坐姿态。
      - 车辆宽度窄，轮廓细长，车身尺寸明显小于轿车、货车、客车。
      - 可能在车流中穿行、沿路肩行驶、沿应急车道行驶、静止停放、横穿道路或从画面边缘短暂出现。
      - 远距离目标可能很小，需要检查画面边缘、角落、上边缘、下边缘和远处区域。
      - 运动速度通常高于行人，但可能低于普通机动车；不能仅因速度较慢而排除。

      类型区分参考：
      | 类型 | 典型特征 |
      |------|----------|
      | motorcycle | 车身较粗壮，可能有排气管，骑手可能佩戴头盔或护具，速度感较快 |
      | electric_bicycle | 车身较细，通常无排气管，可能有脚踏或电池结构，速度感中等 |
      | bicycle | 人力骑行，车身最细，通常可见脚踏动作 |
      | tricycle | 三轮结构，可能有人力或电动驱动 |
      | scooter | 小型踏板或站立式代步工具，尺寸更小 |

      检查步骤：
      1. 逐帧扫描所有视频帧，寻找两轮、三轮或小型代步车辆。
      2. 对画面进行九宫格扫描：左上、上中、右上、左中、中心、右中、左下、下中、右下。每个区域都必须检查。
      3. 必须重点检查画面四个角落和边缘区域，尤其是左上角、上边缘、右上角、左下角、右下角、最右侧应急车道、中央隔离带附近。
      4. 必须优先检查视频开头3帧和最后3帧；开头短暂出现、即将离开画面、结尾新进入画面的目标都必须计入。
      5. 对每一个候选目标判断：
         - 是否属于本事件定义范围
         - 是否有骑乘者轮廓、头盔、车灯、车把、窄小车身或两轮/三轮局部结构
         - 车辆类型：摩托车、电动自行车、自行车、三轮车、滑板车等
         - 所在位置：主车道、应急车道、路肩、匝道、中央隔离带附近、画面边缘或角落
         - 运动状态：行驶、静止、停放、横穿、逆向移动、刚进入画面、即将离开画面
         - 骑手特征：衣着颜色、是否佩戴头盔、骑乘姿态
         - 是否容易与行人、施工设备、标志牌、阴影、杂物、护栏反光点或普通车辆灯光混淆
      6. 即使目标很小、距离较远、只出现在画面边缘、只在开头几帧或最后几帧出现，也要检查。
      7. 如果目标只在开头1–3帧或最后1–3帧出现，但具备小型车身、骑乘姿态、车灯或两轮/三轮局部结构，也必须作为候选实例列出。
      8. 不要只统计从视频开头持续出现的目标；开头即将离开、中途进入、末帧刚进入画面的目标也必须统计。
      9. 如果无法精确区分是摩托车还是电动自行车，可以报告为 unknown_two_wheel_or_three_wheel，并降低置信度，同时在 reasoning 中说明不确定原因。

      首尾帧专项复核要求：
      - 在输出结果前，必须重新检查视频开头3帧和最后3帧。
      - 开头3帧中如果左上角、上边缘、右上角、中央隔离带附近或道路边缘出现小型两轮/三轮目标，即使出现时间很短，也必须计入。
      - 最后3帧中如果左下角、右下角或边缘区域出现新进入目标，即使只出现一次，也必须计入。
      - 对于只出现1–3帧的目标，不要求完整运动轨迹；只要有骑乘姿态、小型车身、车灯或局部两轮/三轮结构，应作为候选目标输出。

      返回 JSON：
      {
        "detected": <true|false>,
        "instances": [
          {
            "start_time_sec": <大致开始时间（秒）>,
            "end_time_sec": <大致结束时间（秒）>,
            "confidence": <0.0-1.0>,
            "evidence_frames": [<帧索引>],
            "vehicle_type": "<motorcycle|electric_bicycle|bicycle|tricycle|electric_tricycle|scooter|unknown_two_wheel_or_three_wheel>",
            "position": "<所在位置描述>",
            "motion_state": "<moving|stationary|parking|crossing|wrong_direction|unknown>",
            "description": "<观察到的内容：车辆类型、颜色、位置、状态、骑乘者特征>",
            "reasoning": "<为什么判定为本事件：两轮/三轮结构、车身尺寸、骑乘姿态、位置、运动状态，以及排除行人/施工设备/普通机动车/标志牌等误报源的依据>"
          }
        ],
        "summary": "<总体评估：共发现多少辆非机动车或两轮/三轮异常车辆，分别是什么类型，位于什么位置>",
        "confidence": <0.0-1.0>
      }

      如果未检测到，返回：
      {
        "detected": false,
        "instances": [],
        "summary": "未检测到非机动车及两轮/三轮异常车辆。已逐帧检查所有视频帧，未发现摩托车、电动自行车、自行车、三轮车、滑板车等目标。",
        "confidence": 0.0
      }

      重要：
      - 所有文本字段 "description"、"reasoning" 和 "summary" 必须使用中文书写。
      - 务必保守。不要把普通机动车、行人、标志牌、阴影、施工设备误判为本事件。
      - 即使只有一辆目标车辆，也要报告 detected=true。
    output_format_hint: "JSON"
  # ---------------------------------------------------------------------------
  # Heavy Congestion Detection (event_id=5)
  # Purpose: Dedicated template for severe traffic congestion detection.
  # Why: Distinguishes normal heavy traffic from actual severe congestion.
  #      Must assess speed reduction, queuing, and stop-and-go patterns.
  # ---------------------------------------------------------------------------
  - template_id: "heavy_congestion_detection"
    name: "严重拥堵检测"
    system_prompt: |
      你是一名交通监控分析师。你的任务是检测高速公路上的严重交通拥堵事件。
    user_prompt: |
      检测这些视频帧中是否存在严重交通拥堵。

      定义 — 严重交通拥堵：
      严重交通拥堵是指高速公路上的车辆通行能力显著下降、车速明显降低、车辆排队长度较长的交通状态。与正常车流密集不同，严重拥堵具有以下特征：
      - 车辆平均速度相比正常高速公路通行速度显著降低（如降至30km/h以下或接近停滞）
      - 车辆密度极高，车间距极小（车头时距明显小于正常跟车距离）
      - 出现明显的走走停停（stop-and-go）交通模式
      - 多车道车辆排队长度延伸较远，形成长队列
      - 车道占有率远超正常通行能力
      - 车辆在多车道上均呈现缓慢移动或静止状态

      视觉特征（必须综合判断）：
      - 车辆密度极高，几乎首尾相接
      - 车辆间距极小，几乎没有超车空间
      - 走走停停模式：部分帧中车辆静止，部分帧中缓慢移动
      - 车辆队列向画面远处延伸，排队长度较长
      - 多车道同时出现缓慢通行，不仅限于单车道

      重要 — 区分规则（必须严格遵守）：
      2. **严重拥堵的核心判断标准**：车速明显下降（视觉上车辆移动极其缓慢或几乎停滞）+ 车辆排队延伸较远。两者缺一不可。
      3. **施工区域导致的拥堵**：如果画面中有施工区域（锥桶、施工标志、工程车等）且车辆因施工而排队缓慢通行，**仍然判定**为严重拥堵。
      4. **事故导致的拥堵**：如果画面中已发生交通事故（碰撞、车辆损坏、人员下车等），则**标注事故**，拥堵作为事故的伴随现象**需另标**为严重拥堵。
      5. **单车道缓慢 = 拥堵**：仅单车道车辆缓慢而其他车道通行正常，判定为严重拥堵。

      检查步骤：
      1. 逐帧观察所有车道的车辆运动状态。
      2. 对比最早帧和最晚帧中同一车辆的位置变化：
         - 如果车辆在多帧中位置几乎不变 → 车辆处于停滞状态
         - 如果车辆位置变化极小（每帧移动距离不足车身长度的10%）→ 车辆处于极低速状态
      3. 观察车辆队列长度：队列是否向画面远处延伸超过3-5辆车的长度？
      4. 观察多车道状态：是否多个车道同时出现车辆停滞或极低速通行？
      5. 排除事故导致的拥堵：检查画面中是否有碰撞、车辆损坏、人员下车等事故迹象。如有，则本事件不标拥堵。
      6. 综合以上信息，判断是否为严重拥堵。

      返回 JSON：
      {
        "detected": <true|false>,
        "instances": [
          {
            "start_time_sec": <float>,
            "end_time_sec": <float>,
            "confidence": <0.0-1.0>,
            "evidence_frames": [<int>],
            "description": "<中文描述：拥堵位置、涉及车道、排队长度、车辆状态等>",
            "reasoning": "<中文推理：详细说明判断依据，包括车速观察、车间距、排队长度、多车道状态、是否排除事故等>"
          }
        ],
        "summary": "<中文总体评估：是否检测到严重拥堵，拥堵程度描述，涉及范围>",
        "confidence": <0.0-1.0>
      }

      如果未检测到严重交通拥堵，返回：
      {
        "detected": false,
        "instances": [],
        "summary": "<中文说明：未检测到严重交通拥堵。描述实际交通状态（如：车流正常通行、车流密集但速度正常、单车道缓慢但其他车道正常等），并说明为什么不符合严重拥堵的判断标准>",
        "confidence": 0.0
      }

      重要：
      - 所有文本字段 "description"、"reasoning" 和 "summary" 必须使用中文书写。
      - 保持保守。仅在确信车速明显下降且排队较长时才报告严重拥堵。
      - 事故导致的拥堵不要重复标注。
    output_format_hint: "JSON"

  # ---------------------------------------------------------------------------
  # Thrown Object Detection (event_id=8)
  # Purpose: Dedicated template for detecting objects on the roadway.
  # Why: Objects can be very small (10x10 pixels at 720p). Model tends to
  #      miss them. Prompt must emphasize proactive, thorough inspection.
  # ---------------------------------------------------------------------------
  - template_id: "thrown_object_detection"
    name: "抛洒物检测"
    system_prompt: |
      你是一名交通监控分析师。你的任务是检测车道内可能影响车辆正常通行的抛洒物。
    user_prompt: |
      检测这些视频帧中的抛洒物（遗落至车道内的异物）。

      定义 — 抛洒物：
      抛洒物是指遗落、掉落或抛洒至高速公路车道内，可能对车辆正常通行造成干扰或安全隐患的物体。抛洒物可以是静止在路面上的，也可以是正在空中飘落的。

      抛洒物包括但不限于：
      - 塑料袋、编织袋、纸张、布料等轻质物品
      - 瓶子、罐子、包装盒等容器类物品
      - 木板、金属片、轮胎碎片等硬质物品
      - 泥土、砂石、建筑材料等散状物品
      - 衣物、被褥、绳索等其他杂物
      - 任何不属于道路正常组成部分的异物

      视觉特征：
      - 车道内出现与路面颜色/纹理明显不同的异物
      - 车道内有反光、飘动、滚动或静止的异常物体
      - 空中飘落的物品（塑料袋、纸张等）
      - 车辆附近突然出现的飞溅物或掉落物

      重要 — 包含规则（以下情况按抛洒物处理）：
      1. **三角警示牌等标识牌的异常状态**：三角牌、警示牌等在无提醒作用时按抛洒物处理。例如：倒在地上、不在事故车辆后方正常放置、被风吹倒等。
      2. **施工物品散落至施工区域外**：施工时的物品（如锥桶、施工标志牌、工具等）如果散落到施工区域以外的车道内，按抛洒物处理。
      3. **小动物/牲畜**：进入车道内的动物按抛洒物处理。

      重要 — 排除规则（以下情况不属于抛洒物）：
      1. **施工区域内正常放置的物品**：施工方在施工区域内正常放置的锥桶、道路施工牌、警示标志、作业设备等**不算**抛洒物。
      2. **事故碎片**：交通事故现场涉及的碎片、散落物由事故统一标注，**不另标**抛洒物。
      3. **路面正常设施**：路面标线、减速带、排水格栅、井盖等道路正常组成部分**不算**抛洒物。
      4. **车辆正常装载物**：车辆上正常装载的货物（即使部分外露）**不算**抛洒物，只有从车上掉落到路面的才算。

      检查步骤（积极主动检测）：
      1. **全画面逐像素扫描**：不要只看画面中央，特别注意：
         - 每条车道的路面区域（包括车道中央、车道分界线附近）
         - 画面远处（物体看起来很小）
         - 画面边缘区域
         - 车辆前方和后方区域
      2. **帧间对比**：对比不同帧中同一位置：
         - 某物体在帧1中存在，帧2中位置变化或消失 → 可能是移动中的抛洒物
         - 某物体在所有帧中静止在同一位置 → 可能是静止抛洒物
         - 某物体突然出现 → 可能是刚掉落的抛洒物
      3. **大小不敏感**：抛洒物可能非常小（在720p缩放下可能只有10x10像素），不要因为小而忽略。任何与路面不同的像素块都值得注意。
      4. **颜色/纹理异常**：寻找与沥青路面颜色、纹理不一致的区域或物体。
      5. **形状异常**：寻找圆形、长条形、片状、团状等不自然形状。
      6. **运动异常**：寻找随风飘动、滚动、弹跳等不自然运动的物体。
      7. **排除正常设施**：确认发现的物体不是路面标线、井盖、排水口等正常设施。

      特别提醒 — 克服"没看到=没有"的倾向：
      - 抛洒物检测需要**积极主动**的态度，而不是被动等待明显目标出现。
      - 即使只有很小的可疑像素块，也要报告并说明为什么怀疑它是抛洒物。
      - 宁可误报也不要漏报。下游系统会进行二次确认。

      返回 JSON：
      {
        "detected": <true|false>,
        "instances": [
          {
            "start_time_sec": <float>,
            "end_time_sec": <float>,
            "confidence": <0.0-1.0>,
            "evidence_frames": [<int>],
            "description": "<中文描述：抛洒物类型、颜色、大小、所在车道位置、状态（静止/滚动/飘落等）>",
            "reasoning": "<中文推理：详细说明发现过程、帧间对比结果、为什么判断为抛洒物、排除了哪些正常设施等>"
          }
        ],
        "summary": "<中文总体评估：是否检测到抛洒物，涉及数量和类型，对交通的潜在影响>",
        "confidence": <0.0-1.0>
      }

      如果未检测到抛洒物，返回：
      {
        "detected": false,
        "instances": [],
        "summary": "<中文说明：未检测到抛洒物。详细说明检查过程，包括检查了哪些区域、对比了哪些帧、排除了哪些可疑目标（如：检查了所有车道路面，未发现与路面颜色/纹理不一致的异物；远处路面清晰，无异常像素块；帧间对比未发现新出现或移动的物体等）>",
        "confidence": 0.0
      }

      重要：
      - 所有文本字段 "description"、"reasoning" 和 "summary" 必须使用中文书写。
      - 即使只有很小的可疑物体，也要报告 detected=true。
      - 抛洒物通常很小，在720p缩放下可能只有10x10像素，需要特别注意。
      - 克服"没看到=没有"的倾向，积极主动检测每一个可疑像素块。
    output_format_hint: "JSON"

  # ---------------------------------------------------------------------------
  # Lane Change on Solid Line Detection (event_id=9)
  # Purpose: Direct VLM fallback template for solid-line lane change violations.
  # Why: Primary logic_chain mode first identifies lane markings, then tracks
  #      lane changes, then filters for solid-line violations. This template
  #      provides a direct VLM detection alternative when needed.
  # Note: This event is currently is_active=false but may be enabled in future.
  # ---------------------------------------------------------------------------
  - template_id: "lane_change_solid_detection"
    name: "实线变道检测"
    system_prompt: |
      你是一名交通监控分析师。你的任务是检测车辆跨越实线变道的违规行为。
    user_prompt: |
      检测这些视频帧中是否存在车辆跨越实线（白色或黄色实线）变道的违规行为。

      定义 — 实线变道违规：
      实线变道违规是指车辆在行驶过程中，主动跨越禁止变道的实线标线（白色实线或黄色实线）从一个车道驶入另一个车道的行为。

      车道标线类型说明：
      - **实线（白色或黄色）**：表示禁止变道区域，车辆不得跨越实线变道。
      - **虚线/断续线（白色）**：表示允许变道区域，车辆在确保安全的前提下可以变道。
      - **虚实线（一侧实线一侧虚线）**：虚线侧车辆可以变道，实线侧车辆禁止变道。
      - **导流线（V形/斜线填充区域）**：属于禁止压线区域，车辆不得压越导流线。

      视觉特征：
      - 车辆从一条车道完整跨越至另一条车道
      - 车辆跨越的是白色或黄色实线（非虚线）
      - 车辆的行驶轨迹明显穿过实线标线
      - 变道过程中车辆有明显的横向位移

      重要 — 区分规则（必须严格遵守）：
      1. **正常行驶中的车轮偶尔压线 ≠ 实线变道**：
         - 车辆正常行驶时车轮短暂接触或略微压过车道线，但车身主体仍在原车道内 → **不判定**为实线变道。
         - 车辆因道路弯曲、避让障碍物等原因短暂压线但立即回到原车道 → **不判定**为实线变道。
         - 只有车辆**主动、完整地从一条车道跨越至另一条车道**才算实线变道。
      2. **虚线变道 ≠ 实线变道**：跨越虚线/断续线的正常变道**不判定**为违规。
      3. **导流线压越**：车辆压越或跨越导流线（V形/斜线填充区域）**判定**为实线变道违规。
      4. **应急车道边界实线**：从主车道跨越实线进入应急车道，或从应急车道跨越实线进入主车道，**判定**为实线变道违规（但应急车道占用由专用模板处理，此处仅标注实线变道行为）。
      5. **匝道汇入/汇出**：匝道车辆汇入主路时跨越虚线或渐变段标线 → **不判定**为违规；但跨越实线强行汇入 → **判定**为违规。
      6. **多帧确认**：必须在多帧中观察到车辆从原车道完整进入目标车道，单帧中的疑似压线不足以判定。

      检查步骤：
      1. 识别画面中的所有车道标线，区分实线和虚线。
      2. 追踪每辆车的行驶轨迹，特别关注：
         - 车辆是否从一条车道移动到另一条车道
         - 跨越的是实线还是虚线
         - 变道是否完整（车身大部分进入新车道）
      3. 对疑似实线变道的车辆，执行以下验证：
         a. **起始帧**：记录车辆在原始车道的位置（车身主体在哪条车道）。
         b. **中间帧**：观察车辆是否正在跨越车道线，记录跨越的是实线还是虚线。
         c. **结束帧**：确认车辆是否已完整进入目标车道（车身主体在新车道内）。
         d. **排除正常压线**：如果车辆只是车轮短暂压线但车身仍在原车道 → 排除。
         e. **排除虚线变道**：确认跨越的是实线（连续不间断的线）而非虚线。
      4. 记录违规车辆的类型、颜色、所在道路、跨越的实线类型（白实线/黄实线/导流线）。

      返回 JSON：
      {
        "detected": <true|false>,
        "instances": [
          {
            "start_time_sec": <float>,
            "end_time_sec": <float>,
            "confidence": <0.0-1.0>,
            "evidence_frames": [<int>],
            "description": "<中文描述：违规车辆类型、颜色、从哪条车道跨越至哪条车道、跨越的实线类型、所在道路>",
            "reasoning": "<中文推理：详细说明变道过程、起始帧和结束帧的车辆位置、跨越的是实线还是虚线、为什么判定为实线变道违规、排除了哪些正常压线情况等>"
          }
        ],
        "summary": "<中文总体评估：是否检测到实线变道违规，涉及车辆数量，违规类型分布>",
        "confidence": <0.0-1.0>
      }

      如果未检测到实线变道违规，返回：
      {
        "detected": false,
        "instances": [],
        "summary": "<中文说明：未检测到实线变道违规。描述实际交通状态（如：所有车辆均在各自车道内正常行驶；有车辆变道但跨越的是虚线；有车辆短暂压线但车身仍在原车道内等），并说明为什么不符合实线变道的判断标准>",
        "confidence": 0.0
      }

      重要：
      - 所有文本字段 "description"、"reasoning" 和 "summary" 必须使用中文书写。
      - 严格区分"正常行驶压线"和"主动变道跨越实线"，前者不判定为违规。
      - 注意导流线、虚实线等特殊标线情况。
      - 保持保守。仅在多帧确认车辆完整跨越实线变道后才报告。
    output_format_hint: "JSON"

  # ---------------------------------------------------------------------------
  # Report Generation (Overall Traffic Summary)
  # ---------------------------------------------------------------------------

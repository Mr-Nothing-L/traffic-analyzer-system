# =============================================================================
# Prompt Templates Configuration
# =============================================================================
# Reusable prompt templates for VLM calls.
# Each template uses Jinja2 syntax for variable substitution.
# =============================================================================

prompt_templates:
  # ---------------------------------------------------------------------------
  # Scene Understanding
  # ---------------------------------------------------------------------------
  - template_id: "scene_understanding"
    name: "Global Scene Understanding"
    system_prompt: |
      You are an expert traffic surveillance analyst. Analyze the provided video frames from a highway monitoring camera.
      Provide a structured analysis of the scene. Be precise and factual.
    user_prompt: |
      Analyze these video frames from a highway surveillance camera.

      The images are provided in chronological order from earliest to latest.
      Each frame has a surveillance timestamp watermark in the top-right or top-left corner (e.g. "2025-06-08 23:59:23" or "14:59:40"). READ these timestamps to determine chronological order.

      When describing vehicle movement, ALWAYS cite the ACTUAL timestamps from the frame watermarks, e.g. "14:59:40 → 15:00:09".
      - A vehicle moving from the top of the frame to the bottom is moving toward the camera (getting larger).
      - A vehicle moving from the bottom of the frame to the top is moving away from the camera (getting smaller).

      Please provide your analysis in the following JSON format:
      {
        "road_count": <number of distinct roads/lane groups>,
        "roads": [
          {
            "road_id": <0-based index>,
            "name": "<camera-relative description. Example: '左侧道路，车辆从画面顶部向底部行驶（从远到近）' or '右侧道路，车辆从画面底部向顶部行驶（从近到远）'. ALWAYS use camera/viewer-relative terms with depth cue (从远到近 / 从近到远).>",
            "normal_direction": "<toward_top|toward_bottom|toward_left|toward_right>",
            "direction_confidence": <0.0-1.0>,
            "direction_reasoning": "<one-sentence explanation of which rule was applied>",
            "lane_count": <number of lanes>,
            "has_emergency_lane": <true|false>
          }
        ],
        "weather": "<clear|rain|fog|snow|unknown>",
        "lighting": "<day|night|dusk|dawn|unknown>",
        "traffic_density": "<light|moderate|heavy>",
        "total_vehicles_estimate": <approximate count>,
        "scene_description": "<brief overall description>",
        "pedestrian_present": <true|false>,
        "non_motor_vehicle_present": <true|false>,
        "thrown_object_present": <true|false>,
        "confidence": <0.0-1.0>
      }

      =============================================================================
      DIRECTION DETERMINATION RULES (apply these INSTEAD of visual motion analysis)
      =============================================================================

      RULE 1 — Bidirectional main road with median barrier (DEFAULT for Chinese expressways):
      - If the video shows TWO main roads separated by a median barrier (guardrail, fence, green strip, or concrete divider):
        - LEFT side road (画面左侧道路): INCOMING traffic, vehicles move TOWARD the camera (from far to near, getting larger) → normal_direction = "toward_bottom"
        - RIGHT side road (画面右侧道路): OUTGOING traffic, vehicles move AWAY from the camera (from near to far, getting smaller) → normal_direction = "toward_top"
        - direction_confidence = 1.0
        - direction_reasoning = "双向主路+隔离带，默认左侧来向右侧去向"
      - This is the DEFAULT assumption. Only override if you see clear evidence of the opposite.

      RULE 2 — Ramps (entrances / exits):
      - If a ramp merges into or diverges from a main road:
        - The ramp flows in the SAME direction as the main road it connects to.
        - If the ramp is on the LEFT side of the main road → normal_direction = "toward_bottom" (same as left main road).
        - If the ramp is on the RIGHT side of the main road → normal_direction = "toward_top" (same as right main road).
        - direction_confidence = 0.9
        - direction_reasoning = "匝道与所在主路同向"

      RULE 3 — Single main road or single ramp (no median barrier visible):
      - Only when the scene shows a SINGLE road or ramp with no clear bidirectional separation:
        - Observe vehicle sizes: vehicles closer to the camera appear LARGER.
        - If vehicles get LARGER as they move toward the BOTTOM of the frame → they are APPROACHING (toward_bottom).
        - If vehicles get LARGER as they move toward the TOP of the frame → they are APPROACHING (toward_top).
        - Use this size-change cue to determine normal_direction.
        - direction_confidence = 0.6-0.8
        - direction_reasoning = "单车道/单匝道，基于语义和透视判断"

      Camera perspective reference:
      - Top of frame = FAR from camera (distant, vehicles appear SMALL).
      - Bottom of frame = NEAR camera (close, vehicles appear LARGE).
      - toward_bottom = moving from top to bottom = APPROACHING camera (getting larger).
      - toward_top = moving from bottom to top = RECEDING from camera (getting smaller).

      IMPORTANT — scene_description requirements:
      In the "scene_description" field, you MUST use the following EXACT structured format for each indicator. This format allows automated parsing — do NOT deviate from it.

      Use the pattern `{类别：状态/描述}` where "无" means absent and any other text means present with details.

      Required tags (must ALL appear in the scene_description, in this order):
      1. `{车流方向：描述}` — For each road, state the normal flow direction explicitly using camera-relative terms (e.g. "左侧道路从画面底部向顶部行驶（从近到远），右侧道路从画面顶部向底部行驶（从远到近）"). Always include both the frame-relative direction (从画面X向Y) AND the depth cue (从近到远/从远到近).
      2. `{行人：无}` or `{行人：有，具体描述}` — "无" if no pedestrians; otherwise describe what you see.
      3. `{应急车道车辆：无}` or `{应急车道车辆：有，具体描述}` — "无" if no vehicles on shoulder; otherwise describe.
      4. `{停车：无}` or `{停车：有，具体描述}` — "无" if no stationary vehicles; otherwise describe.
      5. `{工程车：无}` or `{工程车：有，具体描述}` — "无" if no construction; otherwise describe equipment/vehicles/workers present.
      6. `{非机动车：无}` or `{非机动车：有，具体描述}` — "无" if no motorcycles/bicycles; otherwise describe.
      7. `{交通事故：无}` or `{交通事故：有，具体描述}` — "无" if no accidents; otherwise describe collisions, overturned vehicles, fire, smoke, debris. BE CONSERVATIVE — only use "有" if you are confident.
      8. `{路锥：无}` or `{路锥：有N个，在位置描述}` — "无" if no traffic cones; otherwise state the approximate count and location (e.g., "有12个，在左侧道路应急车道旁形成作业区"). Count visible cones even if partially occluded.

      CRITICAL RULES:
      - The tag name inside the braces must be EXACTLY as shown above.
      - If an event is NOT present, you MUST write "无" after the colon. Do NOT write "未发现" or leave it blank.
      - If an event IS present, write "有，" followed by a brief factual description.
      - All text must be written in Chinese (中文).
      - Example valid scene_description:
        "{车流方向：左侧道路从画面底部向顶部行驶（从近到远），右侧道路从画面顶部向底部行驶（从远到近）} {行人：无} {应急车道车辆：无} {停车：无} {工程车：无} {非机动车：无} {交通事故：无} {路锥：无}"
    output_format_hint: "JSON"

  # ---------------------------------------------------------------------------
  # Direction Analysis (multi-step comprehensive direction determination)
  # Purpose: Dedicated 6-step analysis to reliably determine traffic flow
  #          direction per road. Uses professional traffic analysis methodology.
  #          STRICT REQUIREMENT: ALL 6 steps must be executed, no skipping.
  # ---------------------------------------------------------------------------
  - template_id: "road_direction_analysis"
    name: "Road Direction Analysis"
    system_prompt: |
      You are analyzing highway traffic flow direction. Look at the movement of multiple vehicles to determine the normal driving direction for each road/lane group.
    user_prompt: |
      Analyze these video frames to determine the NORMAL driving direction for each road/lane group.

      Roads identified: {{ road_count }}

      CRITICAL:
      - EACH image has a label burned into the top-left corner showing its frame number and timestamp (e.g. "FRAME 1/8 t=0.00s [OLDEST]"). The images are provided in CHRONOLOGICAL ORDER from OLDEST to NEWEST.
      - For each road, observe the movement pattern of MULTIPLE vehicles across frames. Compare a vehicle's position in an EARLIER frame (lower frame number, smaller timestamp) against a LATER frame (higher frame number, larger timestamp).
      - The normal direction is where MOST vehicles are MOVING.
      - Do NOT use vehicle head orientation; use ONLY position change across frames.

      Return JSON:
      {
        "roads": [
          {
            "road_id": <int>,
            "normal_direction": "<toward_top|toward_bottom|toward_left|toward_right>",
            "confidence": <0.0-1.0>,
            "reasoning": "<brief explanation based on observed vehicle movements>"
          }
        ]
      }

      IMPORTANT:
      - Direction is defined visually relative to the video frame (do NOT use coordinates):
        - "toward_top"    = vehicles move closer to the TOP edge of the frame
        - "toward_bottom" = vehicles move closer to the BOTTOM edge of the frame
        - "toward_left"   = vehicles move closer to the LEFT edge of the frame
        - "toward_right"  = vehicles move closer to the RIGHT edge of the frame
      - To determine direction: pick ONE vehicle, note its position in an EARLIER frame, then note its position in a LATER frame. If it moved toward the top, use "toward_top".
      - Look at MULTIPLE vehicles, not just one
      - In a two-way highway, opposite roads should have opposite directions
      - If direction is unclear, say so with lower confidence

  # ---------------------------------------------------------------------------
  # Direct Reversing Detection
  # Purpose: One-shot detection of reversing/wrong-way vehicles.
  # Why: Fewer VLM calls = fewer parse errors. Direct comparison of first/last frame
  #      catches slow reversing that "suspicious behavior" prompts miss.
  # ---------------------------------------------------------------------------
  - template_id: "direct_reversing_detection"
    name: "Direct Reversing Detection"
    system_prompt: |
      You are a traffic surveillance analyst. Your task is to detect vehicles that are reversing or driving against the normal traffic flow.
      CRITICAL: Compare the FIRST frame and the LAST frame carefully. Some vehicles may appear stationary but have actually moved slightly against the flow.
    user_prompt: |
      The images provided above ARE the video frames you must analyze. You CAN see them — do NOT claim you cannot view images. Base your entire analysis on these frames.

      Examine these video frames from a highway surveillance camera.

      Scene information:
      - Road count: {{ road_count }}
      - Known normal flow directions (pre-determined from scene understanding — use these directly, do NOT re-verify):
      {% for road in road_directions %}
        Road {{ road.road_id }}: {{ road.normal_direction }}
      {% endfor %}
      - Prior knowledge from overall traffic situation analysis:
      {% if scene_description %}
        {{ scene_description }}
      {% else %}
        (No prior scene description available.)
      {% endif %}

      CRITICAL PRIOR KNOWLEDGE:
      The "Prior knowledge" above is from an earlier comprehensive scene analysis. It provides a list of vehicles that MAY be candidates for reversing/wrong-way behavior. However, you MUST NOT take the prior knowledge at face value — your job is to independently verify through frame comparison:
      1. The prior knowledge identifies candidate vehicles (e.g., vehicles on emergency lanes, stopped vehicles, engineering vehicles). Use this as a starting point, not a conclusion.
      2. Even if the prior knowledge describes a vehicle as "stopped", "静止", or "正在作业", you MUST still check whether it is reversing or backing up. A vehicle can be momentarily stopped while in the process of reversing.
      3. Do NOT conclude "no reversing" simply because the prior knowledge says a vehicle is stationary or performing maintenance. Stationary does NOT equal "not reversing" — the vehicle may have just finished reversing, or may be in the process of backing up.
      4. You MUST perform frame-by-frame comparison for EVERY vehicle mentioned in the prior knowledge as being on an emergency lane, shoulder, or stopped. Do not skip any candidate.
      5. CRITICAL — Detection is PURELY PHYSICAL, not legal:
         - Your job is to detect whether a vehicle's BODY MOVEMENT DIRECTION is opposite to the known normal flow. PERIOD.
         - Do NOT make value judgments about whether the behavior is "legal" or "illegal", "violation" or "authorized". That is NOT your task.
         - An engineering vehicle performing road maintenance IS STILL reversing or wrong-way driving if its body moves opposite to the normal flow. You MUST report it.
         - If the vehicle is an engineering/maintenance vehicle, you MAY note this in the "description" field (e.g., "黄色工程养护车在应急车道倒车作业"), but you MUST still set detected=true.
         - The purpose of this system is to RECORD ALL reversing/wrong-way movements, including authorized ones. Downstream systems will decide whether it is a violation.

      INSTRUCTIONS:
      1. Read the "Prior knowledge" carefully. Identify which specific vehicles (if any) are mentioned as being on emergency lanes, shoulders, or stopped/parked illegally.
      2. For EACH vehicle identified in step 1, perform ALL of the following checks and write them in your reasoning:
         a. **Select two frames to compare**: Pick the EARLIEST frame and the LATEST frame where the vehicle is visible. Write their frame numbers/timestamps.
         b. **Pixel displacement estimation**: For the vehicle, estimate pixel displacement between the two frames:
            - Choose a clearly identifiable feature point (e.g., front bumper center, a distinctive marking, or the vehicle's geometric center).
            - Estimate its coordinates in the EARLIER frame and the LATER frame as **percentages of frame width/height** (0-100%).
            - Calculate the displacement: Δx = x_later - x_earlier, Δy = y_later - y_earlier, both in **percentage points**.
            - Also estimate the vehicle's approximate width and height as **percentages of frame dimensions**.
            - Judge significance: if |Δx| or |Δy| exceeds 3% of frame dimension, OR if the displacement magnitude √(Δx² + Δy²) exceeds 2% of frame diagonal, classify as "significant". Otherwise "negligible".
            - Record: pixel_displacement_estimate = {"delta_x_pct": float, "delta_y_pct": float, "magnitude_pct": float, "vehicle_width_pct": float, "vehicle_height_pct": float, "significance": "significant|negligible"}
            - CRITICAL: Even "small" displacements (2-5% of frame) MUST be reported as "significant" if they are consistent in direction across frames. Do NOT dismiss displacement just because the absolute number seems small.
         c. **Position change using fixed reference points**: Describe the vehicle's position in each frame relative to FIXED objects (road markings, guardrails, median barriers, traffic cones, signs) using camera-relative position descriptions (e.g. "画面左侧偏上", "画面中央偏右"). Do NOT use memory or visual estimation — cite specific reference points.
         d. **Head orientation**: State which direction the vehicle's HEAD (front) is pointing (toward_top/toward_bottom/toward_left/toward_right).
         e. **Body movement direction**: State which direction the vehicle's BODY actually moved (toward_top/toward_bottom/toward_left/toward_right) based on position change in (c).
         f. **Compare with KNOWN normal flow**: The known normal flow direction for this road is listed in "Known normal flow directions" above. Is the body movement direction in (e) OPPOSITE to this known normal flow? If yes, this is WRONG-WAY or REVERSING.
         g. **Head vs body consistency**: If head orientation (d) is opposite to body movement (e), the vehicle is REVERSING / BACKING UP. If head orientation matches body movement but both are opposite to known normal flow, it is WRONG-WAY driving.
      3. Be especially careful with white/light-colored vehicles on the shoulder — they are the most common reversing candidates.
      4. Report detected=false ONLY if:
         - No vehicle is mentioned in the prior knowledge as being on an emergency lane, shoulder, or stopped; OR
         - You have performed frame-by-frame comparison for EVERY candidate vehicle and confirmed through position change analysis that NONE of them are moving opposite to the known normal flow.
         - NEVER report detected=false solely because the prior knowledge describes a vehicle as "stopped", "静止", or "正在作业". You must verify through actual frame comparison.
         - NEVER report detected=false because a vehicle is an "engineering vehicle", "工程车", or "养护作业车". These vehicles CAN and DO reverse — you must detect them.

      Return ONLY a JSON object in this exact format (no markdown, no extra text):
      {
        "vehicles": [
          {
            "vehicle_id": "vehicle_1",
            "road_id": 0,
            "behavior": "reversing",
            "start_time_sec": 0.0,
            "end_time_sec": 22.0,
            "confidence": 0.9,
            "description": "White sedan on emergency lane moving backward",
            "reasoning": "通过对比第1帧(0.0s)和第8帧(7.0s)，黄色抢险车相对于左侧护栏和交通锥的位置明显向画面下方移动。第一帧中该车位于画面上方偏右位置，车头朝向下（画面近处）；到最后一帧中该车已移动到画面下方更近处。车辆车头朝向（朝下）与车身移动方向（朝下）一致，但都与正常车流方向（朝上）相反，属于逆行行为。",
            "pixel_displacement_estimate": {
              "delta_x_pct": -2.5,
              "delta_y_pct": 8.0,
              "magnitude_pct": 8.4,
              "vehicle_width_pct": 15.0,
              "vehicle_height_pct": 10.0,
              "significance": "significant"
            }
          }
        ],
        "detected": true,
        "confidence": 0.9,
        "reasoning": "检测到1辆逆行车辆：右侧应急车道上的黄色抢险车。对比第1帧和第8帧，该车相对于交通锥和护栏的位置向画面下方移动，车头朝下但车身也向下移动，与正常车流方向（朝上）相反。"
      }

      If no reversing or wrong-way vehicles are found, return:
      {
        "vehicles": [],
        "detected": false,
        "confidence": 0.0,
        "reasoning": "详细说明检查了哪些车辆，对比了哪些帧，以及为什么判断没有倒车/逆行。例如：检查了右侧应急车道的工程车，对比第1帧和第8帧，该车相对于交通锥的位置向画面下方移动，与正常车流方向一致，因此不是倒车。"
      }

      IMPORTANT:
      - All text fields "description" and "reasoning" must be written in Chinese (中文).
      - The "reasoning" field must contain SPECIFIC frame numbers/timestamps, reference points, and the full chain of reasoning (position change → head orientation → body movement → comparison with normal flow).
      - Even when detected=false, you MUST write a detailed reasoning explaining your analysis process.

      Be conservative. Only report if you are confident after comparing frames.

      CRITICAL — Pixel displacement is your PRIMARY evidence for movement:
      - A displacement classified as "significant" OVERRIDES any subjective impression of "no change".
      - When pixel displacement says "significant" but your visual impression says "no change", TRUST the pixel displacement.
      - Report the pixel numbers explicitly in your reasoning field.

  # ---------------------------------------------------------------------------
  # Vehicle Movement Tracking (precision frames)
  # ---------------------------------------------------------------------------
  - template_id: "direct_event_detection"
    name: "Direct Event Detection"
    system_prompt: |
      You are an expert traffic surveillance analyst. Examine the provided video frames and detect specific traffic events.
    user_prompt: |
      Event to detect: {{ event_name }}
      Definition: {{ event_definition }}
      Visual indicators to look for:
      {% for indicator in visual_indicators %}
      - {{ indicator }}
      {% endfor %}

      Examine these video frames carefully and determine if this event is present.

      Return JSON:
      {
        "detected": <true|false>,
        "instances": [
          {
            "start_time_sec": <approximate start time>,
            "end_time_sec": <approximate end time>,
            "confidence": <0.0-1.0>,
            "evidence_frames": [<frame indices>],
            "description": "<what you observed>",
            "reasoning": "<why you think this is the event>"
          }
        ],
        "summary": "<overall assessment>",
        "confidence": <0.0-1.0>
      }

      If the event is NOT present, return:
      {
        "detected": false,
        "instances": [],
        "summary": "No {{ event_name }} detected in the video.",
        "confidence": 0.0
      }

      IMPORTANT: All text fields "description", "reasoning", and "summary" must be written in Chinese (中文).

      Be conservative - only report what you are reasonably confident about.

  # ---------------------------------------------------------------------------
  # Road Construction Detection
  # Purpose: Dedicated template for road construction / maintenance work zones.
  # Why: Generic template misses the nuance between actual construction
  #      (workers + cones + equipment) vs routine cleaning (sweeper truck only).
  # ---------------------------------------------------------------------------
  - template_id: "road_construction_detection"
    name: "Road Construction Detection"
    system_prompt: |
      You are a traffic surveillance analyst. Detect active road construction or maintenance work zones.
    user_prompt: |
      Detect ROAD CONSTRUCTION / MAINTENANCE WORK ZONES in these video frames.

      Definition — A scene counts as road construction ONLY if it contains:
      1. **Workers in high-visibility clothing** (orange, yellow, or lime-green vests/hats) AND
      2. **A significant number of traffic cones or barriers** (at least 5+ cones, or continuous barrier tape, or work-zone barrels) AND
      3. **Engineering/construction vehicles or equipment** (asphalt pavers, rollers, cement mixers, excavators, dump trucks, cranes, etc.)

      CRITICAL — What does NOT count as road construction:
      - A single sweeper truck or cleaning vehicle performing routine road cleaning WITHOUT workers and WITHOUT a cone barrier system.
      - A parked engineering vehicle with no active work, no workers, and no cones.
      - Emergency rescue or breakdown vehicles (police, ambulance, tow truck) — these are NOT construction.
      - Occasional scattered cones (< 5) without workers or equipment.

      INSTRUCTIONS:
      1. Look for the COMBINATION of workers + cones/barriers + equipment. All three must be present for a confident detection.
      2. If only an engineering vehicle is visible without workers and without a substantial cone/barrier system, report detected=false.
      3. If workers and cones are present but no construction equipment, still report detected=true (manual road work).
      4. Note the approximate location (which lane, shoulder, or full lane closure).

      Return JSON:
      {
        "detected": <true|false>,
        "instances": [
          {
            "start_time_sec": <approximate start time>,
            "end_time_sec": <approximate end time>,
            "confidence": <0.0-1.0>,
            "evidence_frames": [<frame indices>],
            "description": "<what you observed: workers, equipment, cone layout>",
            "reasoning": "<why this is or is not construction: list what you saw and what was missing>"
          }
        ],
        "summary": "<overall assessment>",
        "confidence": <0.0-1.0>
      }

      If the event is NOT present, return:
      {
        "detected": false,
        "instances": [],
        "summary": "未检测到道路施工。说明看到了什么（如：只有一辆清扫车，无工人，无锥桶；或：有工程车但无锥桶隔离系统）。",
        "confidence": 0.0
      }

      IMPORTANT:
      - All text fields "description", "reasoning", and "summary" must be written in Chinese (中文).
      - Be conservative. If unsure whether it is construction vs routine cleaning, report detected=false and explain why.

  # ---------------------------------------------------------------------------
  # Emergency Lane Location
  # ---------------------------------------------------------------------------
  - template_id: "emergency_lane_location"
    name: "Emergency Lane Location"
    system_prompt: |
      Identify emergency lane(s) in highway surveillance video.
    user_prompt: |
      Look at these video frames and identify any emergency lanes (also called hard shoulders or breakdown lanes).

      Emergency lane characteristics:
      - Located on far left or far right edge of roadway
      - Often different colored pavement or texture
      - Marked with solid white lines, hatched markings, or thicker boundary lines
      - Usually narrower than standard lanes
      - May have "Emergency Lane" or "No Stopping" signage

      Return ONLY a JSON object in this exact format (no markdown, no extra text):
      {
        "emergency_lanes": [
          {
            "lane_id": <int>,
            "side": "<left|right>",
            "bbox": [<x1, y1, x2, y2>],
            "confidence": <0.0-1.0>
          }
        ],
        "confidence": <0.0-1.0>
      }

  # ---------------------------------------------------------------------------
  # Emergency Lane Vehicle Tracking
  # ---------------------------------------------------------------------------
  - template_id: "emergency_lane_vehicle_tracking"
    name: "Emergency Lane Vehicle Tracking"
    system_prompt: |
      Track vehicles that enter or occupy emergency lanes.
    user_prompt: |
      Known emergency lane regions:
      {{ emergency_lane_regions | tojson }}

      Examine these video frames and identify all vehicles that:
      1. Enter an emergency lane
      2. Stop or park in an emergency lane
      3. Travel in an emergency lane

      Return ONLY a JSON object in this exact format (no markdown, no extra text):
      {
        "vehicles": [
          {
            "vehicle_id": "<id>",
            "lane_id": <int>,
            "behavior": "<entering|stopping|traveling|parking>",
            "start_time_sec": <float>,
            "end_time_sec": <float>,
            "confidence": <0.0-1.0>
          }
        ]
      }

  # ---------------------------------------------------------------------------
  # Lane Marking Identification
  # ---------------------------------------------------------------------------
  - template_id: "lane_marking_identification"
    name: "Lane Marking Identification"
    system_prompt: |
      Identify and classify lane markings in highway video.
    user_prompt: |
      Examine these video frames and identify all lane markings.
      Classify each as "solid" or "dashed/broken".

      Solid lines indicate no lane changing zones.
      Dashed/broken lines indicate permitted lane changing zones.

      Return ONLY a JSON object in this exact format (no markdown, no extra text):
      {
        "lane_markings": [
          {
            "line_id": <int>,
            "type": "<solid|dashed>",
            "bbox": [<x1, y1, x2, y2>],
            "confidence": <0.0-1.0>
          }
        ]
      }

      If no lane markings are visible, return: {"lane_markings": []}

  # ---------------------------------------------------------------------------
  # Lane Change Tracking
  # ---------------------------------------------------------------------------
  - template_id: "lane_change_tracking"
    name: "Lane Change Tracking"
    system_prompt: |
      Track vehicle lane changes across frames.
    user_prompt: |
      Known lane markings:
      {{ lane_markings | tojson }}

      Examine these precision frames and track vehicles performing lane changes.
      For each lane change, note:
      - Vehicle identification
      - Starting lane and ending lane
      - Position where the vehicle crossed the lane line
      - Timestamp

      Return ONLY a JSON object in this exact format (no markdown, no extra text):
      {
        "lane_changes": [
          {
            "vehicle_id": "<id>",
            "from_lane": <int>,
            "to_lane": <int>,
            "cross_position": [<x, y>],
            "time_sec": <float>,

# Annotation Specification for Traffic Event Detection
# Converted from XLSX标注规范文档
# This file drives the adjudication prompt — edit here instead of the xlsx.

annotation_spec:
  version: "1.0"
  source: "xlsx标注规范文档"
  generated_at: "2026-05-24"

  # ---------------------------------------------------------------------------
  # Global annotation guidelines
  # ---------------------------------------------------------------------------
  global_guidelines:
    - "大模型的事件检测标注，按照常见思维逻辑判断。"
    - "给出关键事件就行了。例如事故拥堵同时发生，此时给出事故即可。"


  # ---------------------------------------------------------------------------
  # Event definitions
  # ---------------------------------------------------------------------------
  events:
    - event_id: 0
      action_label: "机动车违停"
      description: >
        车辆在道路上由行驶状态变为静止状态，且静止持续时间达到3s或移动像素超过10px就认定是非静止状态。
        事件发生的区域包括行车道、应急车道、导流区和路肩。
      boundary_conditions:
        - "只针对机动车（摩托车不算）"
        - "涉及事故→只标事故，不标违停"
        - "施工区域内停车需标违停"
       

    - event_id: 1
      action_label: "机动车占用应急车道"
      description: >
        行驶中的机动车辆偏离正常行驶路径，进入非规定行驶区域且在该区域内停留时间或行进距离达到或超过某一设定值的交通事件，停留时间默认10s，行进距离默认5米。
      boundary_conditions:
        - "只针对机动车"
        - "事件发生区域包括应急车道、导流区"
        - "车辆在应急车道逆行，需标注逆行"
        - "施工区域内，车辆占用应急车道无需标注"
        - "交通事故涉及的占用应急车道，无需标注"
        - "应急车道中工程车若未紧挨着或者被锥桶包围，需要标注"

    - event_id: 2
      action_label: "交通事故"
      description: >
        由车辆引发、导致正常交通流突然中断、车辆异常停止，并造成人员伤亡或财产损失的事件。主要指车辆碰撞事故。
      boundary_conditions:
        - "交通事故涉及的违停、行人、占用应急车道、抛洒物、实线变道等无需给出标注"
        - "事故发生区域包括行车道、应急车道、导流区和路肩"
        - "大模型的事件检测，就按照正常的理解思维确定。例如警车+路锥+一地碎片的组合，可按照交通事故进行标注"

    - event_id: 3
      action_label: "行人/施工人员"
      description: >
        行人或动物进入机动车道或其他禁止进入的区域，且在该区域内停留时间或行进距离达到或超过某一设定值的交通事件，停留时间默认1s。
        动物主要指牛、羊、野猪等体型较大的动物。
      boundary_conditions:
        - "施工人员在施工区域内行走的话，无需标注"
        - "交通事故涉及的行人无需标注"
        - "机动车道/其他禁止的区域——高速最外侧的护栏内"

    - event_id: 4
      action_label: "非机动车"
      description: >
        非机动车（含摩托车）违法驶入高速公路区域的事件。
      boundary_conditions:
        - "非机动车不管是走是停，都算闯入"

    - event_id: 5
      action_label: "拥堵"
      description: >
        道路上出现单车道或多车道通行能力下降的状况,影响道路整体通行效率的交通事件。
      boundary_conditions:
        - "拥堵导致的车辆停止现象只需给出拥堵即可"
        - "单条车道通行能力下降按拥堵标注。至于具体的拥堵原因，看不到的不用管"
        - "无需具体阈值"

    - event_id: 6
      action_label: "施工"
      description: >
        默认同时出现以下情况时，判定为施工事件：
        1. 出现施工车辆。
        2. 出现路锥或施工标志牌。
        3. 出现施工人员。
        以上3个因素，应可根据需求配置为满足其一或者满足多条。
      boundary_conditions:
        - "施工车辆在正常行驶或者人在车上用工具捡拾抛洒物不算施工"
        - "施工人员在施工区域内行走的话无需标注行人"
        - "施工区域内，车辆往返施工不算逆行"
        - "按满足一条且按正常理解属于施工的条件进行标注"
        - "出现施工车辆+人员的组合，如果能够看出人员行为并非施工，不作施工标注"
        - 若工程车仅携带设备和人员形式，但未开始任何施工相关的工作（例如放置锥桶，防止反光板等），则不输出道路施工。
        - "施工区域中，逆行、行人、抛洒物、占用应急车道和实线变道不用标注。"
        - 施工区域中违停要标注出来

    - event_id: 7
      action_label: "逆行"
      description: >
        车辆在道路上行驶方向与交通标志或标线所指示的规定方向相反，且移动距离超过10px可以算作逆行。
      boundary_conditions:
        - "只针对机动车"
        - "施工区域内，车辆往返施工不算逆行"

    - event_id: 8
      action_label: "无典型事件"
      description: >
        正常车流，无其他描述事件。
      boundary_conditions: []

    - event_id: 9
      action_label: "抛洒物"
      description: >
        物体遗落至车道内，对车辆正常通行造成干扰风险，且该遗落物在车道内持续存在的时间达到或超过某一设定值的交通事件，持续时间默认1s。
      boundary_conditions:
        - "除锥桶、道路施工牌等施工方放置的物体外，其余在地面上的一般算作抛洒物；常见目标有：1.塑料袋 2.纸张 3.水瓶 4.垃圾等"
        - "行车道，应急车道，匝道，导流区都算"
        - "对车辆正常通行造成干扰风险这一描述不作为标注的必要条件"
        - "施工区域的杂物不作为抛洒物标注。但施工时的物品例如锥桶等，若散落到施工区域外，则按抛洒物处理"
        - "交通事故涉及的碎片不作为抛洒物标注"
        - "20260420新增：三角牌等标识牌在起到提醒作用时不标注，无提醒作用则按抛洒物处理"

    - event_id: 10
      action_label: "实线变道"
      description: >
        车辆在禁止变道区域穿行，判定为违规变道事件。
      boundary_conditions:
        - "只针对机动车"
        - "车身超过实线一半即可认定为变道"
        - "包括应急车道和导流区"
        - "施工区域内涉及的实线变道无需标注"
        - "交通事故涉及的实线变道无需标注"

# =============================================================================
# Traffic Event Categories Configuration
# =============================================================================
# Based on wanji_grpo_train.py event definitions.
# Users can add new categories by appending to this file.
# Each category maps to a bit position in the binary encoding output.
#
# Binary encoding format: {bit_0_bit_1_..._bit_n}
# Example: {1_0_1_0_0_0_0_0_1_0} means event 0, 2, and 8 are detected.
# =============================================================================

event_categories:
  - event_id: 0
    event_code: "A"
    name: "Illegal Parking"
    name_zh: "违法停车"
    description: "Vehicles stopped on main travel lanes, blocking regular lanes or access points, or parked in no-stopping zones."
    detection_mode: "direct_vlm"
    definition: |
      违法停车判定规则（必须与标注文档 v4.5 完全一致）：
      1. 只针对机动车——摩托车、电动自行车、自行车等非机动车静止时**不判定**为违法停车。
      2. 车辆由行驶状态变为静止状态。**注意：静止持续时间无需在视频中完整体现，视频中只要能看到车辆处于静止/停放状态即可判定。**
      3. 事件发生的区域包括：行车道、应急车道、导流区和路肩。
      4. 施工区域内，车辆停车施工需标注为违法停车。不要因为车辆位于施工区域就排除其违法停车的判定。
      5. 涉及交通事故时，只需标注交通事故，**不重复标注**违法停车。
      6. 应急车道上的车辆静止时，需同时判定违法停车和应急车道占用（两个事件均触发）。
    visual_indicators:
      - "机动车静止在行车道/应急车道/导流区/路肩"
      - "车辆长时间阻挡车道"
      - "禁停标志区域内停车"
      - "车辆明显处于静止/停放状态（无需验证静止时长）"
    confidence_threshold: 0.7
    is_active: true
    prompt_template_id: "illegal_parking_detection"

  - event_id: 1
    event_code: "B"
    name: "Emergency Lane Occupancy"
    name_zh: "应急车道占用"
    description: "Vehicles entering, stopping, occupying, or traveling within the emergency lane."
    detection_mode: "direct_vlm"
    prompt_template_id: "emergency_lane_occupancy_detection"
    definition: |
      Emergency lanes typically have the following characteristics:
      - Located on the far left or far right edge of the roadway
      - Often marked with different colored pavement (red, yellow, or distinct asphalt)
      - May have different line markings (solid white lines, hatched markings, or thicker boundary lines)
      - Usually narrower than standard traffic lanes
      - May contain signage indicating "Emergency Lane", "No Stopping Except Emergency"
      - Often have a different surface texture or material
      - Typically free of regular traffic flow
      - May be separated by rumble strips or raised pavement markers
    visual_indicators:
      - "Vehicle in emergency lane area"
      - "Different pavement color/texture"
      - "Emergency lane signage"
    confidence_threshold: 0.7
    is_active: true

  - event_id: 2
    event_code: "C"
    name: "Traffic Accident"
    name_zh: "交通事故"
    description: "Vehicle collisions, breakdowns, debris, overturned vehicles, fire or smoke from vehicles."
    detection_mode: "logic_chain"
    logic_chain_id: "accident_scene_tag"
    prompt_template_id: "traffic_accident_detection"
    definition: |
      Traffic Incidents on highways include but are not limited to:
      - Vehicle collisions (rear-end, side-impact, multi-vehicle)
      - Vehicle breakdowns or stalled vehicles
      - Debris or obstacles on the roadway
      - Overturned or rolled vehicles
      - Fire or smoke from vehicles
      - Animals on the roadway
    visual_indicators:
      - "Damaged vehicles"
      - "Smoke or fire"
      - "Debris on road"
      - "Overturned vehicle"
    confidence_threshold: 0.7
    is_active: true

  - event_id: 3
    event_code: "D"
    name: "Person Presence in Highway"
    name_zh: "高速公路行人出现"
    description: "Pedestrians, stranded motorists, or individuals crossing restricted highway areas."
    detection_mode: "scene_tag"
    definition: |
      Person presence in highway indicators include:
      - Highways are restricted areas where pedestrian access poses serious safety risks
      - Highway intrusions typically involve pedestrians, stranded motorists who have exited vehicles
      - Common false positives include roadside signs, bridge shadows, overpasses, vegetation
      - Detection confidence should account for partial occlusions, motion blur, and perspective distortion
    visual_indicators:
      - "Human figure on highway lanes"
      - "Person on shoulder or median"
      - "Stranded motorist outside vehicle"
    confidence_threshold: 0.7
    is_active: true
    prompt_template_id: "pedestrian_detection"
    scene_boolean_field: "pedestrian_present"  # SceneInfo 布尔字段名
    scene_tag_key: "行人"  # scene_description 结构化标签键

  - event_id: 4
    event_code: "E"
    name: "Motorcycle Presence"
    name_zh: "摩托车出现"
    description: "Motorcycles present on the highway."
    detection_mode: "scene_tag"
    definition: |
      Motorcycle Presence has the following key visual indicators:
      - Two-wheeled configuration with visible wheels aligned front-to-back
      - Smaller profile compared to cars and trucks
      - Single rider or passenger positioned in tandem
      - Visible handlebars and exposed engine components
      - Often positioned between lanes or in standard traffic lanes
      - Riders typically wear helmets and protective gear
    visual_indicators:
      - "Two-wheeled vehicle"
      - "Rider with helmet"
      - "Smaller vehicle profile"
    confidence_threshold: 0.7
    is_active: true
    prompt_template_id: "motorcycle_detection"
    scene_boolean_field: "non_motor_vehicle_present"  # SceneInfo 布尔字段名
    scene_tag_key: "非机动车"  # scene_description 结构化标签键

  - event_id: 5
    event_code: "F"
    name: "Heavy Congestion"
    name_zh: "严重拥堵"
    description: "Severe traffic congestion with reduced speeds and high vehicle density."
    detection_mode: "direct_vlm"
    definition: |
      Traffic Congestion on highways is typically characterized by:
      - Reduced vehicle speeds compared to typical highway flow
      - High vehicle density with minimal spacing between vehicles
      - Stop-and-go traffic patterns
      - Lane occupancy rates exceeding normal capacity
      - Reduced average vehicle velocity across multiple lanes
      - Extended queuing or backup of vehicles
    visual_indicators:
      - "High vehicle density"
      - "Minimal spacing between vehicles"
      - "Stop-and-go pattern"
      - "Vehicle queue extending far"
    confidence_threshold: 0.7
    is_active: true
    prompt_template_id: "heavy_congestion_detection"

  - event_id: 6
    event_code: "G"
    name: "Road Construction"
    name_zh: "道路施工"
    description: "Road construction zones with equipment, workers, and temporary signage."
    detection_mode: "direct_vlm"
    definition: |
      Road construction indicators include:
      - Orange traffic cones, barrels, or barriers creating work zones
      - Construction vehicles (asphalt pavers, rollers, cement mixers, dump trucks, excavators)
      - Workers in high-visibility clothing (orange, yellow, or lime green vests)
      - Lane closures or narrowed lanes with temporary markings
      - Construction equipment actively operating or parked in work zones
      - Temporary signage indicating construction ahead or lane shifts
      - Fresh asphalt (darker surface), concrete work, or exposed roadbed
      - Reduced speed limit signs specific to work zones
      - Flashing warning lights on construction vehicles or arrow boards
    visual_indicators:
      - "Orange cones/barrels"
      - "Construction vehicles"
      - "Workers in safety vests"
      - "Lane closure signs"
    confidence_threshold: 0.7
    is_active: true
    prompt_template_id: "road_construction_detection"

  - event_id: 7
    event_code: "H"
    name: "Vehicle Reversing"
    name_zh: "车辆逆行/倒车"
    description: "Vehicle moving opposite to the flow of traffic, including reversing or backing up."
    detection_mode: "logic_chain"
    logic_chain_id: "vehicle_reversing"
    definition: |
      Vehicle reversing has the following key visual indicators:
      - White reverse lights/backup lights illuminated on the vehicle
      - Vehicle moving opposite to the flow of traffic
      - Decreasing distance between the vehicle and fixed reference points behind it
      - Vehicle moving backward relative to lane markings or road features

      IMPORTANT: Reversing/Backing up is classified as a form of wrong-way driving (逆行).
      The core determination is whether the vehicle's MOVEMENT DIRECTION is opposite to
      the normal flow direction of its lane.
    visual_indicators:
      - "Vehicle moving against traffic flow"
      - "Backup lights illuminated"
      - "Decreasing distance to rear reference points"
    confidence_threshold: 0.8
    is_active: true

  - event_id: 8
    event_code: "J"
    name: "Thrown Objects"
    name_zh: "抛洒物"
    description: "Objects on the highway roadway, either stationary or moving."
    detection_mode: "direct_vlm"
    definition: |
      Thrown objects on highways can include:
      - Objects may be stationary on the road surface or moving through the air
      - Plastic bags, bottles, papers, clothing items, small debris, etc.
      - Objects may blend with road surface colors or be highly contrasting
    visual_indicators:
      - "Foreign object on roadway"
      - "Debris in traffic lane"
      - "Flying object near vehicles"
    confidence_threshold: 0.7
    is_active: true
    prompt_template_id: "thrown_object_detection"

  - event_id: 9
    event_code: "K"
    name: "Lane Change over Solid Line"
    name_zh: "实线变道"
    description: "Vehicle crossing solid lane lines to change lanes."
    detection_mode: "logic_chain"
    logic_chain_id: "lane_change_solid"
    prompt_template_id: "lane_change_solid_detection"
    definition: |
      Lane changes across solid lane lines can include:
      - Solid white or yellow lines indicate areas where lane changes are prohibited
      - Dashed/broken lane lines indicate areas where lane changes are permitted when safe
      - A lane change violation occurs when a vehicle's path crosses over a solid line
      - Vehicle positioning should be tracked relative to lane markings throughout
      - Brief tire contact during normal driving is different from active lane change across the line
    visual_indicators:
      - "Vehicle crossing solid white/yellow line"
      - "Lane change in no-change zone"
      - "Solid line violation"
    confidence_threshold: 0.7
    is_active: false

# =============================================================================
# 跨事件推断规则（Cross-Event Inference Rules）
# =============================================================================
# 当一个事件被检测到时，可以据此推断另一个相关事件。
# 例如：违法停车在路肩 → 推断为应急车道占用。
# 用户可在此处自定义推断规则，无需修改代码。
#
# 字段说明：
#   target_event_id:    要推断的目标事件 ID
#   source_event_id:    源事件 ID（必须先被检测到）
#   source_description_keywords: 在源事件实例的 description 中匹配任一关键词即触发
#   confidence_multiplier: 推断结果的置信度 = 源事件置信度 × 此系数
#   description_prefix: 推断实例的描述前缀
#   reasoning:          推断理由（报告中显示）
# =============================================================================

cross_event_inference_rules:
  - rule_id: "parking_to_emergency"
    name: "违法停车在路肩 -> 应急车道占用"
    target_event_id: 1
    source_event_id: 0
    source_description_keywords: ["shoulder", "emergency", "路肩", "应急"]
    confidence_multiplier: 0.9
    description_prefix: "车辆在应急车道/路肩区域停放"
    reasoning: "违法停车事件检测到车辆在应急车道/路肩区域停放，符合应急车道占用定义。"


# =============================================================================
# 交通事件类别配置 (Traffic Event Categories)
# =============================================================================
# 事件定义 / 检测模式 / Prompt 模板 / 裁决规则 全部通过 YAML 配置。
# 新增事件无需改代码，只需在本文件追加并运行 validate-config。
#
# 输出格式：二进制编码 {bit_0_bit_1_..._bit_9}
# 示例：{1_0_1_0_0_0_0_0_1_0} 表示事件 0、2、8 被检出。
# =============================================================================

# -----------------------------------------------------------------------------
# 检测模式说明
# -----------------------------------------------------------------------------
# expert_agent → 独立专家 Agent 检测。必需字段：prompt_template_id
#                每位专家只负责事实识别（看到就报），不做排除判断。
#                最终排除/冲突裁决由 AdjudicationStep 处理。
#
# 关闭事件请用 is_active: false，不要注释整段（保留二进制位数）。
# -----------------------------------------------------------------------------

event_categories:
  # --- event_id: 0 | 违法停车 (A) ---
  - event_id: 0
    event_code: "A"
    name: "Illegal Parking"
    name_zh: "违法停车"
    description: "机动车在禁止停车区域静止或停放"
    detection_mode: "expert_agent"
    prompt_template_id: "illegal_parking_detection"
    confidence_threshold: 0.7
    is_active: true
    definition: |
      违法停车判定规则（与标注文档 v4.5 一致）：
      1. 只针对机动车——非机动车静止时不判定为违法停车。
      2. 车辆由行驶状态变为静止状态。静止持续时间无需完整体现，视频中只要能看到车辆处于静止/停放状态即可判定。
      3. 事件区域：行车道、应急车道、导流区、路肩。

  # --- event_id: 1 | 应急车道占用 (B) ---
  - event_id: 1
    event_code: "B"
    name: "Emergency Lane Occupancy"
    name_zh: "应急车道占用"
    description: "车辆进入、停止、占用或在应急车道内行驶"
    detection_mode: "expert_agent"
    prompt_template_id: "emergency_lane_occupancy_detection"
    confidence_threshold: 0.7
    is_active: true
    definition: |
      应急车道（路肩）特征：
      - 位于道路最外侧边缘，通常由白色实线与主车道分隔
      - 路面颜色/纹理可能与主车道不同
      - 宽度通常比标准车道窄
      - 可能有"应急车道"标志或隆声带
      - 匝道出入口处的白色/黄色网状实线导流区也属于应急车道

  # --- event_id: 2 | 交通事故 (C) ---
  - event_id: 2
    event_code: "C"
    name: "Traffic Accident"
    name_zh: "交通事故"
    description: "车辆碰撞、翻车、起火、散落物等突发事件"
    detection_mode: "expert_agent"
    prompt_template_id: "traffic_accident_detection"
    confidence_threshold: 0.7
    is_active: true
    definition: |
      交通事故包括：车辆碰撞、翻车、起火/冒烟、路面散落物、动物进入车道等。
      注意：单独车辆机械故障（无碰撞、无人员伤亡、无财产损失）不算事故。

  # --- event_id: 3 | 高速公路行人出现 (D) ---
  - event_id: 3
    event_code: "D"
    name: "Person Presence in Highway"
    name_zh: "高速公路行人出现"
    description: "行人或滞留驾乘人员出现在高速公路限制区域"
    detection_mode: "expert_agent"
    prompt_template_id: "pedestrian_detection"
    confidence_threshold: 0.7
    is_active: true
    definition: |
      行人出现：高速公路车道、路肩、中央隔离带、匝道等区域行走的普通人或滞留驾乘人员。

  # --- event_id: 4 | 摩托车出现 (E) ---
  - event_id: 4
    event_code: "E"
    name: "Motorcycle Presence"
    name_zh: "摩托车出现"
    description: "摩托车出现在高速公路上"
    detection_mode: "expert_agent"
    prompt_template_id: "non_motor_vehicle_detection"
    confidence_threshold: 0.7
    is_active: true
    definition: |
      摩托车出现：两轮/三轮摩托车在高速公路上行驶或静止。
      注意与电动自行车/自行车区分：摩托车有燃油发动机、车把、排气管，骑手通常戴头盔。

  # --- event_id: 5 | 严重拥堵 (F) ---
  - event_id: 5
    event_code: "F"
    name: "Heavy Congestion"
    name_zh: "严重拥堵"
    description: "车辆通行能力显著下降、车速明显降低、排队较长的交通状态"
    detection_mode: "expert_agent"
    prompt_template_id: "heavy_congestion_detection"
    confidence_threshold: 0.7
    is_active: true
    definition: |
      严重拥堵特征：车速显著降低（接近停滞）、车辆密度极高、车间距极小、走走停停模式、
      多车道同时排队且队列延伸较远。与正常车流密集不同，需车速下降+排队延伸两者兼具。

  # --- event_id: 6 | 道路施工 (G) ---
  - event_id: 6
    event_code: "G"
    name: "Road Construction"
    name_zh: "道路施工"
    description: "道路施工或维护作业区域"
    detection_mode: "expert_agent"
    prompt_template_id: "road_construction_detection"
    confidence_threshold: 0.7
    is_active: true
    definition: |
      道路施工判定（v4.5）：
      - 有交通锥/隔离栏布置形成的作业区/车道封闭，且至少有一项：施工人员、工程车辆、车道封闭引导
      - 或路面作业的施工设备
      排除：单一清扫车日常清洁；应急救援车辆；施工车辆缓行/停车、人员仅捡垃圾等非施工操作。

  # --- event_id: 7 | 车辆逆行/倒车 (H) ---
  - event_id: 7
    event_code: "H"
    name: "Vehicle Reversing"
    name_zh: "车辆逆行/倒车"
    description: "车辆移动方向与车道正常流向相反"
    detection_mode: "expert_agent"
    prompt_template_id: "direct_reversing_detection"
    confidence_threshold: 0.8
    is_active: true
    definition: |
      车辆逆行/倒车：车辆移动方向与所在车道正常流向相反。
      判定依据：白倒车灯亮、车辆相对于固定参照物反向移动、车头朝向与正常流向相反。

  # --- event_id: 8 | 抛洒物 (J) ---
  - event_id: 8
    event_code: "J"
    name: "Thrown Objects"
    name_zh: "抛洒物"
    description: "车道内可能影响通行的遗落异物"
    detection_mode: "expert_agent"
    prompt_template_id: "thrown_object_detection"
    confidence_threshold: 0.7
    is_active: true
    definition: |
      抛洒物：遗落至车道内可能影响车辆通行的异物（塑料袋、瓶子、木板、泥土等）。
      排除：施工区域内正常放置的物品；事故碎片（由事故统一标注）；路面正常设施；车辆正常装载物。
      三角警示牌：起到提醒作用时不标；无提醒作用（倒地、不在事故车后正常放置）按抛洒物处理。

  # --- event_id: 9 | 实线变道 (K) [关闭中] ---
  - event_id: 9
    event_code: "K"
    name: "Lane Change over Solid Line"
    name_zh: "实线变道"
    description: "车辆跨越实线标线变道"
    detection_mode: "expert_agent"
    prompt_template_id: "lane_change_solid_detection"
    confidence_threshold: 0.7
    is_active: false
    definition: |
      实线变道：车辆主动跨越白色/黄色实线从一个车道驶入另一个车道。
      排除：车轮短暂压线但车身仍在原车道；跨越虚线变道；匝道正常汇入。

# =============================================================================
# 裁决规则 (Adjudication Rules)
# =============================================================================
# 这些规则嵌入 AdjudicationStep 的 prompt 中，由 VLM 根据业务语义进行裁决。
# 不是代码执行的硬规则，而是指导 VLM 做出符合业务要求的判断。
#
# 字段说明：
#   rule_id:   规则唯一标识
#   name:      规则名称（供日志使用）
#   description: 规则详细描述（嵌入 prompt 给 VLM 阅读）
#   priority:  优先级（数值越大越优先），用于规则排序
# =============================================================================

adjudication_rules:
  - rule_id: "accident_suppresses_parking"
    name: "事故优先于违停"
    description: "如果检测到交通事故，则同一区域的违法停车应被排除。事故场景中的静止车辆属于事故的一部分，不应再单独标记为违停。"
    priority: 100

  - rule_id: "construction_excludes_emergency"
    name: "施工区域排除应急车道占用"
    description: "如果车辆明确位于施工区域内（有锥桶、施工车辆、作业人员等标识），则不应判定为应急车道占用。施工车辆/人员有权限使用该区域。"
    priority: 90

  - rule_id: "motorcycle_excludes_emergency"
    name: "摩托车排除应急车道占用"
    description: "当应急车道出现摩托车时，优先判定为'摩托车出现'事件。不应将同一辆摩托车同时标记为应急车道占用（避免重复）。"
    priority: 80

  - rule_id: "accident_debris_excludes_thrown_object"
    name: "事故碎片排除抛洒物"
    description: "如果检测到交通事故，则事故现场散落的碎片、零件等不应判定为抛洒物。这些碎片属于事故的一部分，由事故事件统一覆盖。"
    priority: 90

  - rule_id: "construction_excludes_reversing"
    name: "施工区域排除逆行"
    description: "施工区域内作业的工程车辆（如压路机、洒水车等）的往返移动不属于逆行/倒车。施工区域内正常的施工车辆移动不触发逆行事件。"
    priority: 85

  - rule_id: "construction_excludes_parking"
    name: "施工停车排除违停"
    description: "施工区域内停放的施工车辆（挖掘机、吊车、工程车等）不属于违法停车。只有非施工的普通机动车在施工区域无故停放才考虑违停。"
    priority: 85

  - rule_id: "emergency_parking_both"
    name: "应急车道静止触发双事件"
    description: "当车辆在应急车道上静止停放时，应同时触发'违法停车'和'应急车道占用'两个事件。这两个事件不是互斥的，可以同时存在。"
    priority: 70


version: "3.8"

services:
  traffic-agent-gpu:
    build:
      context: .
      dockerfile: Dockerfile.gpu
    image: traffic-agent:gpu
    container_name: traffic-agent-gpu
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - PYTHONPATH=/data
    volumes:
      - .:/data
      - /media/wanji/Elements/高速交通事件Agent测试视频V4:/data/test_videos
    working_dir: /data
    stdin_open: true
    tty: true
    command: ["tail", "-f", "/dev/null"]

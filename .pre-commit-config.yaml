# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files

  - repo: local
    hooks:
      - id: traffic-analyzer-validate-config
        name: Traffic Analyzer Config Validation
        entry: python -m traffic_analyzer validate-config --config-dir ./traffic_analyzer/config
        language: system
        files: ^traffic_analyzer/config/.*\.(yaml|yml)$
        pass_filenames: false
        always_run: false
